<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitti Bol — Himachali Pahari Song Studio</title>
<style>
:root {
  --bg-deepest: #0b0b14;
  --bg-surface: #14142a;
  --bg-card: #1c1c36;
  --bg-input: #252542;
  --bg-hover: #2f2f50;
  --text-main: #e8e0d8;
  --text-dim: #a09888;
  --text-muted: #6b6560;
  --pine: #3d8a37;
  --teal: #4a90d9;
  --earth: #a0522d;
  --sunset: #ff6b35;
  --snow: #f5f0e8;
  --border: #2a2a40;
  --danger: #e74c3c;
  --success: #27ae60;
  --warning: #f39c12;
  --radius: 8px;
  --font: system-ui, -apple-system, sans-serif;
  --mono: ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg-deepest);
  color: var(--text-main);
  line-height: 1.6;
  min-height: 100vh;
}
input, textarea, select, button { font-family: inherit; font-size: inherit; }
::selection { background: var(--pine); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Layout */
.app { display: grid; grid-template-columns: 380px 1fr; min-height: 100vh; }
.left-panel { border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.right-panel { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
@media (max-width: 960px) {
  .app { grid-template-columns: 1fr; }
  .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
}

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.header h1 { font-size: 1.4rem; font-weight: 700; color: var(--snow); }
.header h1 em { color: var(--sunset); font-style: normal; }
.header .tagline { font-size: 0.75rem; color: var(--text-dim); }
.header-actions { display: flex; gap: 8px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px; border: none; border-radius: var(--radius);
  font-size: 0.85rem; font-weight: 500; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--earth); color: #fff; }
.btn-primary:hover:not(:disabled) { background: #c06030; }
.btn-secondary { background: var(--bg-input); color: var(--text-main); }
.btn-secondary:hover:not(:disabled) { background: var(--bg-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { opacity: 0.85; }
.btn-ghost { background: transparent; color: var(--text-dim); padding: 6px; }
.btn-ghost:hover { color: var(--text-main); background: var(--bg-input); }
.btn-sm { padding: 4px 10px; font-size: 0.78rem; }
.btn-icon { width: 34px; height: 34px; padding: 0; }

/* Inputs */
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 0.78rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field textarea, .field select {
  background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px; color: var(--text-main); outline: none; width: 100%;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--teal); }
.field textarea { resize: vertical; min-height: 60px; }
.field select { cursor: pointer; }
.field .hint { font-size: 0.72rem; color: var(--text-muted); }

/* Card */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.card-header h3 { font-size: 0.85rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }

/* Char counter */
.char-count { font-size: 0.72rem; font-variant-numeric: tabular-nums; }
.char-count.ok { color: var(--text-muted); }
.char-count.warn { color: var(--warning); }
.char-count.over { color: var(--danger); }

/* Pipeline tracker */
.steps { display: flex; gap: 0; align-items: stretch; overflow-x: auto; padding: 4px 0; }
.step {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  font-size: 0.75rem; font-weight: 500; white-space: nowrap;
  border-radius: 20px; background: var(--bg-input); color: var(--text-muted);
  flex-shrink: 0;
}
.step + .step { margin-left: 4px; }
.step.active { background: var(--teal); color: #fff; }
.step.done { background: var(--pine); color: #fff; }
.step.failed { background: var(--danger); color: #fff; }
.step.skipped { background: var(--bg-hover); color: var(--text-dim); font-style: italic; }
.step-icon { font-size: 0.85rem; line-height: 1; }
.step-msg { display: block; font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }

/* Tags/badges */
.badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; }
.badge-high { background: #3a1515; color: var(--danger); }
.badge-medium { background: #3a2a10; color: var(--warning); }
.badge-info { background: #10203a; color: var(--teal); }
.badge-success { background: #102a15; color: var(--success); }

/* Contamination scan hit */
.scan-hit {
  display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px;
  border-left: 3px solid var(--danger); margin-top: 4px;
  font-size: 0.78rem; background: var(--bg-input); border-radius: 0 var(--radius) var(--radius) 0;
}
.scan-hit.medium { border-left-color: var(--warning); }
.scan-hit-info { flex: 1; min-width: 0; }
.scan-hit-word { font-weight: 600; color: var(--snow); }
.scan-hit-line { color: var(--text-dim); font-size: 0.72rem; }
.scan-hit-suggest { color: var(--success); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  padding: 20px;
}
.modal {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto;
  padding: 24px;
}
.modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
.modal .field + .field { margin-top: 12px; }

/* Lyrics monospace */
.mono { font-family: var(--mono); font-size: 0.82rem; line-height: 1.65; }

/* Live scan panel */
.live-scan-panel { display: flex; flex-direction: column; gap: 4px; }
.live-scan-panel .scan-count { font-size: 0.72rem; color: var(--text-muted); }
.live-scan-panel .scan-count.has-hits { color: var(--warning); }

/* History */
.history-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: var(--radius); cursor: pointer; background: var(--bg-input);
  transition: background 0.15s; border: 1px solid transparent;
}
.history-item:hover { background: var(--bg-hover); border-color: var(--border); }
.history-item-info { flex: 1; min-width: 0; }
.history-item-title { font-size: 0.82rem; font-weight: 500; color: var(--snow); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-item-meta { font-size: 0.7rem; color: var(--text-muted); }

/* Accordion */
.accordion-toggle {
  background: none; border: none; color: var(--teal); cursor: pointer;
  font-size: 0.78rem; padding: 4px 0;
}
.accordion-toggle:hover { text-decoration: underline; }
.accordion-body { margin-top: 8px; }

/* Inline warning callout */
.callout { padding: 10px 14px; border-radius: var(--radius); font-size: 0.82rem; line-height: 1.5; }
.callout-warn { background: #3a2a10; border-left: 3px solid var(--warning); color: var(--text-main); }
.callout-error { background: #3a1515; border-left: 3px solid var(--danger); }
.callout-info { background: #10203a; border-left: 3px solid var(--teal); }

/* Lexicon editor */
.lex-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.lex-table th { text-align: left; padding: 6px 8px; color: var(--text-dim); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
.lex-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
.lex-table .rtl { color: var(--text-muted); font-size: 0.72rem; }

/* Utilities */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mb-2 { margin-bottom: 8px; }
.text-sm { font-size: 0.82rem; }
.text-xs { font-size: 0.72rem; }
.text-dim { color: var(--text-dim); }
.text-muted { color: var(--text-muted); }
.text-danger { color: var(--danger); }
.text-success { color: var(--success); }
.text-warning { color: var(--warning); }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.w-full { width: 100%; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
// === IMPORTS ===
import { h, render, Fragment } from 'https://esm.sh/preact@10.26.4';
import htm from 'https://esm.sh/htm@3.1.1';
import { signal, computed, effect } from 'https://esm.sh/@preact/signals@2.0.1';
const html = htm.bind(h);

// === DOMAIN DATA ===

const LEXICON = [
  { pahari: 'dandru', gloss_en: 'teeth (diminutive -ru)', avoid: ['daant'], tags: ['body'], notes: 'Chitte dandru = white teeth, a beauty trope' },
  { pahari: 'kundu', gloss_en: 'where', avoid: ['kahan'], tags: ['grammar'] },
  { pahari: 'bitti', gloss_en: 'girl / daughter', avoid: ['larki', 'beti'], tags: ['people'] },
  { pahari: 'ghughuti', gloss_en: 'a bird (songbird)', avoid: ['chidiya'], tags: ['nature'] },
  { pahari: 'rouni', gloss_en: 'night', avoid: ['raat'], tags: ['time'] },
  { pahari: 'banjar', gloss_en: 'barren / fallow land', avoid: [], tags: ['nature'] },
  { pahari: 'bagaich', gloss_en: 'garden', avoid: ['bagh'], tags: ['nature'] },

  { pahari: 'jaalu', gloss_en: 'when', avoid: ['jadon', 'jab'], tags: ['grammar'] },
  { pahari: 'katha', gloss_en: 'talk / story', avoid: ['gallan'], tags: ['noun'] },
  { pahari: 'ri', gloss_en: 'genitive feminine suffix', avoid: ['di'], tags: ['grammar'], notes: '"ri" not "di" for feminine genitive' },
  { pahari: 'ra', gloss_en: 'genitive masculine suffix', avoid: ['da'], tags: ['grammar'], notes: '"ra" not "da" for masculine genitive' },

  { pahari: 'sheeli', gloss_en: 'cold / cool', avoid: ['thandi'], tags: ['adj'] },
  { pahari: 'graan', gloss_en: 'village', avoid: ['pind', 'gaon'], tags: ['place'] },

  { pahari: 'jhumku', gloss_en: 'earring (diminutive)', avoid: ['bali'], tags: ['clothing'] },
  { pahari: 'mela', gloss_en: 'village fair', avoid: ['mela (acceptable)'], tags: ['culture'] },
  { pahari: 'naati', gloss_en: 'Pahari folk dance / song genre', avoid: ['bhangra'], tags: ['music'] },
  { pahari: 'deodar', gloss_en: 'Himalayan cedar tree', avoid: [], tags: ['nature'] },
  { pahari: 'pahari', gloss_en: 'of the mountains / Pahari people', avoid: [], tags: ['identity'] },
];

const CONTAMINATION_RULES = [
  { pattern: '\\bde naal\\b', language: 'punjabi', severity: 'high', suggestion: 'manjh', explanation: 'Punjabi "de naal" means "with"; use Pahari "manjh" or postpositional forms' },
  { pattern: '\\bjadon\\b', language: 'punjabi', severity: 'high', suggestion: 'jaalu', explanation: 'Punjabi "jadon" = when; Pahari uses "jaalu"' },
  { pattern: '\\bgallan\\b', language: 'punjabi', severity: 'high', suggestion: 'katha', explanation: 'Punjabi "gallan" = talk/stories; Pahari uses "katha"' },
  { pattern: '\\bdila ch\\b', language: 'punjabi', severity: 'high', suggestion: 'manjh', explanation: 'Punjabi "dila ch" = in the heart; use Pahari "manjh"' },
  { pattern: '\\bmainu\\b', language: 'punjabi', severity: 'high', suggestion: 'minjo', explanation: 'Punjabi "mainu" = to me; Pahari uses "minjo"' },
  { pattern: '\\btainu\\b', language: 'punjabi', severity: 'high', suggestion: 'tujo / tujhe', explanation: 'Punjabi "tainu" = to you; use Pahari forms' },
  { pattern: '\\bpind\\b', language: 'punjabi', severity: 'high', suggestion: 'graan', explanation: 'Punjabi "pind" = village; Pahari uses "graan"' },
  { pattern: '\\bvich\\b', language: 'punjabi', severity: 'high', suggestion: 'manjh', explanation: 'Punjabi "vich" = in; Pahari uses "manjh"' },
  { pattern: '\\bdi\\b', language: 'punjabi', severity: 'high', suggestion: 'ri / ra / re', explanation: 'Punjabi genitive "di" should be Pahari "ri" (fem) / "ra" (masc) / "re" (obl)' },
  { pattern: '\\bda\\b', language: 'punjabi', severity: 'high', suggestion: 'ra', explanation: 'Punjabi genitive "da" should be Pahari "ra"' },
  { pattern: '\\bde\\b', language: 'punjabi', severity: 'high', suggestion: 're', explanation: 'Punjabi oblique genitive "de" should be Pahari "re"' },
  { pattern: '\\bmujhe\\b', language: 'hindi', severity: 'medium', suggestion: 'minjo', explanation: 'Hindi "mujhe" = to me; use Pahari "minjo"' },
  { pattern: '\\btumhara\\b', language: 'hindi', severity: 'medium', suggestion: 'tera / teri', explanation: 'Hindi "tumhara" = your; use Pahari "tera/teri"' },
  { pattern: '\\bkyunki\\b', language: 'hindi', severity: 'medium', suggestion: 'kathi / je', explanation: 'Hindi "kyunki" = because; use Pahari forms' },
  { pattern: '\\blekin\\b', language: 'hindi', severity: 'medium', suggestion: 'par / magar (acceptable)', explanation: 'Hindi "lekin" = but; "par" is borderline acceptable' },
  { pattern: '\\bdekhda\\b', language: 'hindi', severity: 'medium', suggestion: 'herda', explanation: 'Hindi "dekhda" = watching; use Pahari "herda"' },
  { pattern: '\\braat\\b', language: 'hindi', severity: 'medium', suggestion: 'rouni', explanation: 'Hindi "raat" = night; use Pahari "rouni"' },
  { pattern: '\\blarki\\b', language: 'hindi', severity: 'medium', suggestion: 'bitti', explanation: 'Hindi "larki" = girl; use Pahari "bitti"' },
];

const SUNO_RULES = {
  limits: { lyrics: 5000, style: 1000, title: 100 },
  requiredSections: ['[Intro]', '[Verse', '[Chorus]'],
  recommendedSections: ['[Bridge]', '[Outro]'],
  styleRules: {
    firstSentenceLanguage: 'Himachali Pahari',
    mustContain: ['naati', 'dhol', 'nagara'],
    bpm: { min: 90, max: 105 },
    forbidPhrases: ['crisp snare on the backbeat', 'crisp snare', 'backbeat'],
    forbidWords: ['bhangra'],
    tagVocabulary: [
      '[flute trill]', '[bansuri melody]', '[acoustic guitar fill]', '[soft electric guitar fill]',
      '[dhol accents]', '[valley echo]', '[male vocals with folk ornamentation]', '[group vocal harmony]',
      '[full band, naati dance rhythm]', '[acoustic guitar strumming]', '[high-pitched flute melody]',
      '[steady dhol kick]', '[chimta metallic chime]', '[electric guitar crunch]', '[dhol heartbeat]',
      '[raw mountain voice]', '[foot stomp rhythm]', '[nagara beat]',
    ],
  },
};

const SONG_PATTERNS = {
  form: 'O…/Ho… call-and-answer with callback last line',
  structure: ['Intro', 'Verse 1', 'Chorus', 'Verse 2', 'Chorus', 'Bridge', 'Verse 3', 'Verse 4', 'Chorus', 'Outro'],
  tropeChains: [
    'white teeth → red chunnru in wind → jhumku swaying → mela dancing',
    'deodar shade → moonlight → waiting on path → heart longing',
    'snowy peaks → village path → dhol rhythm → feet dancing',
  ],
  chorusRule: 'identical hook text on every repetition',
};

const PROMPT_FRAGMENTS = {
  composerPersona: 'You are a master Himachali Pahari folk songwriter from the Mahasuvi/Sirmauri belt. You create authentic, soulful songs for the Suno v5.5 AI music generation platform.',
  dialectRequirement: 'CRITICAL: Lyrics MUST be in the Mahasuvi/Sirmauri dialect of Himachali Pahari — NOT standard Hindi, NOT Punjabi. Use authentic Pahari words, grammar, and expressions. The dialect must feel authentic to someone from the Shimla/Sirmaur hills.',
  lyricsFormat: 'Use Suno v5.5 tags: [Intro], [Verse 1]-[Verse 4], [Chorus] (identical on each repetition), [Bridge] (quiet shift), [Outro] (fade). Include instrument performance tags and vocal direction tags. The hook/chorus must be memorable and repeatable.',
  styleFormat: 'Style block = comma-separated English descriptor string. Structure: [Genre/Style], [Vocal Type], [Instruments], [Tempo/Key/Mood]. Must open with language hint "sung in Himachali Pahari" as the first sentence. Explicitly name naati as genre. Name dhol and nagara for percussion. No backbeat phrasing. BPM must be stated and fall within 90-105.',
  titleRule: 'Romanized Pahari title, 2-5 words, poetic, not English, not Devanagari.',
  outputContract: 'Respond ONLY with a valid JSON object: {"title": "...", "lyrics": "...", "style": "..."}. No markdown fences. No other text.',
  criticPersona: 'You are a Himachali Pahari language expert specializing in Mahasuvi/Sirmauri dialects. Analyze song lyrics for dialect authenticity.',
  criticOutput: 'Respond with JSON: {"is_authentic": bool, "confidence": 0-1, "issues": [{"excerpt": "...", "problem": "...", "suggestion": "..."}]}',
};

// === STORAGE ===
const STORAGE_KEY = 'bitti-bol:v2';
const LEGACY_KEY = 'bitti-bol-history';

const DEFAULT_SETTINGS = {
  composer: { baseUrl: 'https://opencode.ai/zen/go/v1', apiKey: '', model: 'deepseek-v4-flash', temperature: 0.85, maxTokens: 4000 },
  critic: { baseUrl: 'https://opencode.ai/zen/go/v1', apiKey: '', model: 'deepseek-v4-flash', temperature: 0.2, maxTokens: 2000 },
  criticEnabled: true,
  sameAsCritic: true,
};

const DEFAULT_USER_LEXICON = [];

function createDefaultStorage() {
  return { schemaVersion: 2, settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS)), history: [], userLexicon: [] };
}

function migrateV1History() {
  try {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (!raw) return [];
    const old = JSON.parse(raw);
    if (!Array.isArray(old)) return [];
    return old.map(s => ({
      id: s.id || crypto.randomUUID(),
      createdAt: s.generated_at || new Date().toISOString(),
      title: s.title || 'Untitled',
      lyrics: s.lyrics?.content || '',
      style: s.style?.content || '',
      topic: s.topic || '',
      prefs: {},
      report: { mechanical: { warnings: [], isValid: true }, scan: [], critic: null, repair: null },
      pipelineVersion: 1,
    }));
  } catch (e) {
    return [];
  }
}

let _storage = createDefaultStorage();
try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === 'object' && parsed.schemaVersion === 2) {
      _storage = {
        ...createDefaultStorage(),
        ...parsed,
        settings: { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) },
      };
    }
  }
} catch (e) {
  _storage = createDefaultStorage();
}
if (_storage.history.length === 0) {
  const migrated = migrateV1History();
  if (migrated.length > 0) _storage.history = migrated;
}

function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(_storage)); } catch (e) { /* quota exceeded */ }
}

// === SIGNALS ===
const settings = signal(_storage.settings);
const formTopic = signal('');
const formMood = signal('');
const formOccasion = signal('');
const formInstruments = signal('');
const formNotes = signal('');
const pipelineStep = signal('idle');
const pipelineError = signal(null);
const pipelineSteps = signal([]);
const songTitle = signal('');
const songLyrics = signal('');
const songStyle = signal('');
const songReport = signal(null);
const scanHits = signal([]);
const showSettings = signal(false);
const showLexicon = signal(false);
const showExportImport = signal(false);
const history = signal(_storage.history);
const importError = signal(null);
const copyFeedback = signal({ title: false, lyrics: false, style: false });

// Persistent settings watcher
effect(() => {
  _storage.settings = settings.value;
  saveStorage();
});
effect(() => { _storage.history = history.value; saveStorage(); });

// Live contamination scan — debounced
let scanTimer = null;
function scheduleScan(text) {
  clearTimeout(scanTimer);
  if (!text.trim()) { scanHits.value = []; return; }
  scanTimer = setTimeout(() => {
    scanHits.value = runContaminationScan(text);
  }, 400);
}

// === LLM ADAPTER ===
async function llmCall(slot, systemPrompt, userPrompt, { expectJson = true } = {}) {
  const cfg = settings.value[slot];
  const isComposer = slot === 'composer';
  const timeoutMs = isComposer ? 90000 : 60000;

  if (!cfg.apiKey) return { ok: false, errorKind: 'auth', message: 'No API key configured for ' + slot + ' — set it in Settings.' };
  if (!cfg.baseUrl) return { ok: false, errorKind: 'auth', message: 'No base URL configured for ' + slot + ' — set it in Settings.' };

  const baseUrl = cfg.baseUrl.replace(/\/+$/, '');
  const url = baseUrl + '/chat/completions';

  const body = {
    model: cfg.model || 'deepseek-v4-flash',
    messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }],
    temperature: cfg.temperature ?? (isComposer ? 0.85 : 0.2),
    max_tokens: cfg.maxTokens ?? (isComposer ? 4000 : 2000),
  };
  if (expectJson) body.response_format = { type: 'json_object' };

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.apiKey },
      body: JSON.stringify(body),
      signal: controller.signal,
    });
    clearTimeout(timer);

    if (resp.status === 401 || resp.status === 403) {
      const msg = await resp.text().catch(() => '');
      return { ok: false, errorKind: 'auth', message: 'Key rejected (' + resp.status + '). Verify your API key.' + (msg ? ' ' + msg.slice(0, 200) : '') };
    }
    if (resp.status === 429) {
      return { ok: false, errorKind: 'rate_limit', message: 'Rate limited. Wait a moment and retry.' };
    }
    if (!resp.ok) {
      const msg = await resp.text().catch(() => '');
      return { ok: false, errorKind: 'provider_error', message: 'Provider error (' + resp.status + ')' + (msg ? ': ' + msg.slice(0, 300) : '') };
    }

    const data = await resp.json();
    const content = data?.choices?.[0]?.message?.content;
    const finish = data?.choices?.[0]?.finish_reason;

    if (!content) {
      if (finish === 'length') return { ok: false, errorKind: 'bad_json', message: 'Response empty (max_tokens too short or reasoning ate tokens). Try increasing max_tokens.' };
      return { ok: false, errorKind: 'bad_json', message: 'Empty response from model.' };
    }

    if (!expectJson) return { ok: true, data: content };

    let json;
    try {
      const cleaned = content.replace(/^```(?:json)?\s*/, '').replace(/\s*```$/, '').trim();
      json = JSON.parse(cleaned);
    } catch (e) {
      return { ok: false, errorKind: 'bad_json', message: 'Failed to parse response as JSON. Raw: ' + content.slice(0, 300) };
    }
    return { ok: true, data: json };
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') return { ok: false, errorKind: 'timeout', message: 'Request timed out after ' + (timeoutMs / 1000) + 's.' };
    const msg = e.message || String(e);
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('CORS') || msg.includes('network')) {
      return { ok: false, errorKind: 'cors_or_network', message: 'Network/CORS error. The provider may not allow browser calls. Set a proxy base URL in Settings.' };
    }
    return { ok: false, errorKind: 'provider_error', message: msg };
  }
}

// === VALIDATORS ===

function validateMechanical(lyrics, style) {
  const warnings = [];
  const lc = lyrics.length;
  const sc = style.length;

  if (lc > SUNO_RULES.limits.lyrics) warnings.push({ code: 'lyrics_overflow', severity: 'high', message: 'Lyrics exceed ' + SUNO_RULES.limits.lyrics + ' chars (' + lc + '). Suno may truncate.' });
  if (sc > SUNO_RULES.limits.style) warnings.push({ code: 'style_overflow', severity: 'high', message: 'Style exceeds ' + SUNO_RULES.limits.style + ' chars (' + sc + '). Suno may truncate.' });

  for (const tag of SUNO_RULES.requiredSections) {
    if (tag === '[Verse') {
      if (!lyrics.match(/\[Verse\s*\d+\]/i)) warnings.push({ code: 'missing_' + tag, severity: 'high', message: 'Missing required section: [Verse N]' });
    } else {
      if (!lyrics.includes(tag)) warnings.push({ code: 'missing_' + tag, severity: 'high', message: 'Missing required section: ' + tag });
    }
  }
  for (const tag of SUNO_RULES.recommendedSections) {
    if (!lyrics.includes(tag)) warnings.push({ code: 'missing_' + tag, severity: 'medium', message: 'Consider adding ' + tag + ' for better suno structure' });
  }

  // Chorus consistency
  const chorusSections = [];
  const lines = lyrics.split('\n');
  let inChorus = false;
  let currentChorus = [];
  for (const line of lines) {
    if (/\[Chorus\]/i.test(line) || /\[Chorus\s*\d*\]/i.test(line)) {
      if (inChorus && currentChorus.length) chorusSections.push(currentChorus.join('\n').trim());
      inChorus = true;
      currentChorus = [];
      continue;
    }
    if (inChorus) {
      if (/^\[/.test(line.trim())) {
        if (currentChorus.length) chorusSections.push(currentChorus.join('\n').trim());
        inChorus = false;
        currentChorus = [];
        continue;
      }
      currentChorus.push(line);
    }
  }
  if (inChorus && currentChorus.length) chorusSections.push(currentChorus.join('\n').trim());
  if (chorusSections.length > 1) {
    const normalized = chorusSections.map(c => c.replace(/\s+/g, ' ').trim());
    const first = normalized[0];
    for (let i = 1; i < normalized.length; i++) {
      if (normalized[i] !== first) warnings.push({ code: 'chorus_mismatch', severity: 'medium', message: 'Chorus ' + (i + 1) + ' differs from first Chorus. Suno v5.5 works best with identical hooks.' });
    }
  }

  // Style checks
  const styleLower = style.toLowerCase();
  const firstSentence = style.split(/[,.]/)[0]?.trim().toLowerCase() || '';
  if (!firstSentence.includes('himachali') && !firstSentence.includes('pahari')) {
    warnings.push({ code: 'style_language_hint', severity: 'medium', message: 'Style block should open with a language hint (e.g. "sung in Himachali Pahari")' });
  }
  for (const word of SUNO_RULES.styleRules.mustContain) {
    if (!styleLower.includes(word)) warnings.push({ code: 'style_missing_' + word, severity: 'medium', message: 'Style block should mention "' + word + '" for authentic Pahari sound' });
  }
  const bpmMatch = style.match(/\b(\d{2,3})\s*bpm\b/i);
  if (bpmMatch) {
    const bpm = parseInt(bpmMatch[1]);
    if (bpm < SUNO_RULES.styleRules.bpm.min || bpm > SUNO_RULES.styleRules.bpm.max) {
      warnings.push({ code: 'style_bpm', severity: 'medium', message: 'BPM ' + bpm + ' outside recommended range (' + SUNO_RULES.styleRules.bpm.min + '-' + SUNO_RULES.styleRules.bpm.max + ') for naati rhythm' });
    }
  } else {
    warnings.push({ code: 'style_bpm_missing', severity: 'medium', message: 'Style block should include a BPM range within ' + SUNO_RULES.styleRules.bpm.min + '-' + SUNO_RULES.styleRules.bpm.max });
  }
  for (const phrase of SUNO_RULES.styleRules.forbidPhrases) {
    if (styleLower.includes(phrase.toLowerCase())) warnings.push({ code: 'style_backbeat', severity: 'medium', message: 'Avoid "' + phrase + '" (bhangra attractor). Use "dhol" and "nagara" phrasing instead.' });
  }

  const isValid = warnings.filter(w => w.severity === 'high').length === 0;
  return { warnings, isValid };
}

function runContaminationScan(lyrics) {
  const hits = [];
  const lines = lyrics.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (/^\[.*\]$/.test(trimmed)) continue; // skip bracket-tag lines
    for (const rule of CONTAMINATION_RULES) {
      const re = new RegExp(rule.pattern, 'gi');
      let m;
      while ((m = re.exec(line)) !== null) {
        hits.push({
          match: m[0],
          line: line.trim(),
          lineNo: i + 1,
          language: rule.language,
          severity: rule.severity,
          suggestion: rule.suggestion,
          explanation: rule.explanation,
          pattern: rule.pattern,
        });
      }
    }
  }
  return hits;
}

function applyReplacement(text, pattern, replacement) {
  const re = new RegExp(pattern, 'gi');
  return text.replace(re, replacement);
}

function assemblePrompt(prefs, includeLexicon = true) {
  const lexBlock = includeLexicon ? LEXICON.map(e => e.pahari + ' = ' + e.gloss_en + (e.avoid?.length ? ' (avoid: ' + e.avoid.join(', ') + ')' : '')).join('\n') : '';
  const rulesBlock = 'Style rules:\n- First sentence: "sung in Himachali Pahari"\n- Must name genre as naati\n- Percussion: dhol and nagara (no backbeat phrasing)\n- BPM: ' + SUNO_RULES.styleRules.bpm.min + '-' + SUNO_RULES.styleRules.bpm.max + '\n- No bhangra references\n';
  const structureBlock = 'Structure: ' + SONG_PATTERNS.structure.join(' → ') + '\nForm: ' + SONG_PATTERNS.form + '\nTrope chains: ' + SONG_PATTERNS.tropeChains.join('; ') + '\nChorus rule: ' + SONG_PATTERNS.chorusRule + '\n';

  const userLines = [];
  userLines.push('Create a Himachali Pahari folk song about: ' + prefs.topic);
  if (prefs.mood) userLines.push('Mood: ' + prefs.mood);
  if (prefs.occasion) userLines.push('Occasion: ' + prefs.occasion);
  if (prefs.instruments) userLines.push('Incorporate these instruments: ' + prefs.instruments);
  if (prefs.notes) userLines.push('Additional guidance: ' + prefs.notes);
  userLines.push('\nRemember: Lyrics in authentic Mahasuvi/Sirmauri Pahari. Style in English. Output ONLY valid JSON.');

  return {
    system: PROMPT_FRAGMENTS.composerPersona + '\n\n' + PROMPT_FRAGMENTS.dialectRequirement + '\n\n## Pahari Lexicon (use these)\n' + lexBlock + '\n\n## ' + rulesBlock + '\n\n## ' + structureBlock + '\n\n## Output Format\n' + PROMPT_FRAGMENTS.titleRule + '\n' + PROMPT_FRAGMENTS.lyricsFormat + '\n' + PROMPT_FRAGMENTS.styleFormat + '\n' + PROMPT_FRAGMENTS.outputContract,
    user: userLines.join('\n'),
  };
}

function assembleCriticPrompt(lyrics) {
  const lexBlock = LEXICON.map(e => e.pahari + ' = ' + e.gloss_en).join('\n');
  const rulesBlock = CONTAMINATION_RULES.filter(r => r.severity === 'high').map(r => r.pattern + ' (' + r.language + ' ' + r.severity + ') → ' + r.suggestion).join('\n');
  return {
    system: PROMPT_FRAGMENTS.criticPersona + '\n\nLexicon:\n' + lexBlock + '\n\nKnown contamination patterns:\n' + rulesBlock + '\n\n' + PROMPT_FRAGMENTS.criticOutput,
    user: 'Validate these lyrics:\n\n' + lyrics.slice(0, 3000),
  };
}

// === PIPELINE ===

function pushStep(name, status, msg) {
  pipelineSteps.value = [...pipelineSteps.value, { name, status, message: msg || '' }];
}

async function runPipeline(prefs) {
  pipelineStep.value = 'composing';
  pipelineError.value = null;
  pipelineSteps.value = [];
  pushStep('composing', 'active', 'Calling composer…');

  const prompts = assemblePrompt(prefs);
  const result = await llmCall('composer', prompts.system, prompts.user);

  if (!result.ok) {
    pipelineStep.value = 'failed';
    pushStep('composing', 'failed', result.message);
    pipelineError.value = result;
    return;
  }

  const d = result.data;
  if (!d.title || !d.lyrics || !d.style) {
    pipelineStep.value = 'failed';
    pushStep('composing', 'failed', 'Incomplete generation: missing title/lyrics/style');
    pipelineError.value = { ok: false, errorKind: 'bad_json', message: 'Model returned incomplete data. Try again.' };
    return;
  }

  pushStep('composing', 'done', '');
  songTitle.value = d.title;
  songLyrics.value = d.lyrics;
  songStyle.value = d.style;

  // Step 2: Mechanical validation
  pipelineStep.value = 'validating';
  pushStep('validating', 'active', '');
  const mech = validateMechanical(d.lyrics, d.style);
  pushStep('validating', mech.isValid ? 'done' : 'done', mech.isValid ? '' : mech.warnings.length + ' warnings');

  // Step 3: Contamination scan
  pipelineStep.value = 'scanning';
  pushStep('scanning', 'active', '');
  const scan = runContaminationScan(d.lyrics);
  const highScanHits = scan.filter(h => h.severity === 'high').length;
  pushStep('scanning', 'done', highScanHits ? highScanHits + ' high hits' : 'clean');

  // Step 4: Critic
  let criticResult = null;
  if (settings.value.criticEnabled) {
    pipelineStep.value = 'critiquing';
    pushStep('critiquing', 'active', '');
    const cPrompts = assembleCriticPrompt(d.lyrics);
    const cResult = await llmCall('critic', cPrompts.system, cPrompts.user);
    if (cResult.ok) {
      criticResult = cResult.data;
      const auth = cResult.data.is_authentic;
      const conf = cResult.data.confidence || 0;
      pushStep('critiquing', 'done', auth ? 'authentic (conf ' + conf.toFixed(2) + ')' : 'issues (conf ' + conf.toFixed(2) + ')');
    } else {
      pushStep('critiquing', 'skipped', 'critic unavailable: ' + cResult.message);
    }
  } else {
    pushStep('critiquing', 'skipped', 'disabled in settings');
  }

  // Step 5: Repair (max once)
  let repairApplied = false;
  let beforeScan = scan.length;
  let afterScan = scan.length;
  const needRepair = (criticResult && criticResult.is_authentic === false && (criticResult.confidence || 0) < 0.7) || highScanHits > 0;

  if (needRepair) {
    pipelineStep.value = 'repairing';
    pushStep('repairing', 'active', 'Applying repair…');

    const issues = [];
    for (const h of scan) issues.push('- Line ' + h.lineNo + ': "' + h.match + '" (' + h.language + ') → ' + h.suggestion);
    if (criticResult && criticResult.issues) {
      for (const iss of criticResult.issues) issues.push('- "' + (iss.excerpt || '') + '": ' + (iss.problem || '') + ' → ' + (iss.suggestion || ''));
    }

    const repairPrompt = 'The following lyrics have dialect issues. Fix ONLY the flagged constructions with the suggested Pahari forms. Keep the title, structure, tags, and all other lines byte-identical. Return the same JSON shape {title, lyrics, style}.\n\nOriginal lyrics:\n' + d.lyrics + '\n\nIssues:\n' + issues.join('\n');
    const rResult = await llmCall('composer', 'You are a Himachali Pahari dialect editor. ' + PROMPT_FRAGMENTS.dialectRequirement, repairPrompt);
    if (rResult.ok) {
      const rd = rResult.data;
      if (rd.lyrics && rd.lyrics.length > 0) {
        songLyrics.value = rd.lyrics;
        repairApplied = true;
        afterScan = runContaminationScan(rd.lyrics).length;
        pushStep('repairing', 'done', 'High hits: ' + highScanHits + ' → ' + runContaminationScan(rd.lyrics).filter(h => h.severity === 'high').length);
      } else {
        pushStep('repairing', 'done', 'repair produced empty lyrics, keeping original');
      }
    } else {
      pushStep('repairing', 'done', 'repair failed: ' + rResult.message + ', keeping original');
    }
  }

  // Done
  pipelineStep.value = 'done';
  pushStep('done', 'done', '');

  const report = {
    mechanical: mech,
    scan,
    critic: criticResult,
    repair: repairApplied ? { applied: true, beforeHigh: highScanHits, afterHigh: runContaminationScan(songLyrics.value).filter(h => h.severity === 'high').length } : null,
  };
  songReport.value = report;

  const record = {
    id: crypto.randomUUID(),
    createdAt: new Date().toISOString(),
    title: songTitle.value,
    lyrics: songLyrics.value,
    style: songStyle.value,
    topic: prefs.topic,
    prefs,
    report,
    pipelineVersion: 2,
  };
  history.value = [record, ...history.value].slice(0, 50);
  pipelineStep.value = 'done';
}

function PipelineTracker() {
  const steps = pipelineSteps.value;
  if (steps.length === 0) return null;
  const icons = { done: '✅', active: '⏳', failed: '❌', skipped: '⏭️' };
  return html`
    <div class="card">
      <div class="steps">
        ${steps.map(s => html`
          <div class="step step-${s.status}">
            <span class="step-icon">${icons[s.status] || '○'}</span>
            ${s.name}${s.message ? html`<span class="text-xs text-dim">: ${s.message}</span>` : ''}
          </div>
        `)}
      </div>
      ${pipelineError.value ? html`
        <div class="callout callout-error mt-2">
          <strong>${pipelineError.value.errorKind}</strong>: ${pipelineError.value.message}
          ${pipelineError.value.errorKind === 'cors_or_network' ? html`
            <div class="mt-2 text-sm">💡 OpenCode Zen may need a CORS proxy. Configure one in <button class="accordion-toggle" onClick=${() => showSettings.value = true}>Settings</button>.</div>
          ` : ''}
          ${pipelineError.value.errorKind === 'auth' ? html`
            <div class="mt-2 text-sm">💡 Check your API key in <button class="accordion-toggle" onClick=${() => showSettings.value = true}>Settings</button>.</div>

}

function CharCounter({ text, limit }) {
  const len = (text || '').length;
  const cls = len > limit ? 'over' : len > limit * 0.9 ? 'warn' : 'ok';
  return html`<span class="char-count ${cls}">${len} / ${limit}</span>`;
}

function EditorBlock({ label, value, onChange, maxLen, mono, placeholder, extra }) {
  const Tag = mono ? 'textarea' : 'textarea';
  return html`
    <div class="card">
      <div class="card-header">
        <h3>${label}</h3>
        <div class="flex items-center gap-2">
          <${CharCounter} text=${value.value} limit=${maxLen} />
          <button class="btn btn-ghost btn-sm" onClick=${async () => {
            try {
              await navigator.clipboard.writeText(value.value);
              copyFeedback.value = { ...copyFeedback.value, [label.toLowerCase()]: true };
              setTimeout(() => copyFeedback.value = { ...copyFeedback.value, [label.toLowerCase()]: false }, 1500);
            } catch (e) {}
          }}>${copyFeedback.value[label.toLowerCase()] ? '📋 copied!' : '📋 copy'}</button>
        </div>
      </div>
      <${Tag}
        class="w-full ${mono ? 'mono' : ''}"
        style="background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text-main);outline:none;resize:vertical;min-height:${label === 'Lyrics' ? '200px' : '80px'}"
        value=${value}
        onInput=${e => { value.value = e.target.value; if (label === 'Lyrics') scheduleScan(e.target.value); }}
        placeholder=${placeholder || ''}
      />
      ${extra || ''}
    </div>
  `;
}

function ContaminationPanel() {
  const hits = scanHits.value;
  if (!hits.length) return html`
    <div class="live-scan-panel">
      <div class="scan-count">No contamination detected</div>
    </div>
  `;
  const high = hits.filter(h => h.severity === 'high').length;
  return html`
    <div class="live-scan-panel">
      <div class="scan-count has-hits">${hits.length} hit${hits.length !== 1 ? 's' : ''} (${high} high)</div>
      ${hits.slice(0, 15).map((h, i) => html`
        <div class="scan-hit ${h.severity === 'medium' ? 'medium' : ''}">
          <div class="scan-hit-info">
            <div><span class="scan-hit-word">${h.match}</span> <span class="badge badge-${h.severity === 'high' ? 'high' : 'medium'}">${h.language}</span> <span class="text-xs text-dim">line ${h.lineNo}</span></div>
            <div class="scan-hit-line">${h.line.slice(0, 60)}${h.line.length > 60 ? '…' : ''}</div>
            <div class="scan-hit-suggest">→ ${h.suggestion}</div>
          </div>
          <button class="btn btn-sm btn-secondary" onClick=${() => {
            songLyrics.value = applyReplacement(songLyrics.value, h.pattern, h.suggestion);
            scheduleScan(songLyrics.value);
          }}>Apply</button>
        </div>
      `)}
      ${hits.length > 15 ? html`<div class="text-xs text-dim">…and ${hits.length - 15} more</div>` : ''}
    </div>
  `;
}

function ValidationReport() {
  const report = songReport.value;
  if (!report) return html`<div class="card"><div class="text-sm text-dim">Run a generation to see the validation report.</div></div>`;

  return html`
    <div class="card">

        ${open.value ? '▼' : '▶'} Validation Report
        ${mech.warnings.length ? html`<span class="badge badge-medium">${mech.warnings.length}</span>` : html`<span class="badge badge-success">✓</span>`}
      </button>
      ${open.value ? html`
        <div class="accordion-body">
          <div class="text-sm text-dim mb-2">Mechanical</div>

          <div class="text-sm text-dim mt-3 mb-2">Contamination Scan (${scan.length} hit${scan.length !== 1 ? 's' : ''})</div>

      <div class="field"><label>Model</label><input value=${s[name].model} onInput=${e => setNested(name + '.model', e.target.value)} placeholder="deepseek-v4-flash" /></div>
      <div class="field"><label>Temperature</label><input type="number" step="0.05" min="0" max="2" value=${s[name].temperature} onInput=${e => setNested(name + '.temperature', parseFloat(e.target.value) || 0.85)} /></div>
      <div class="field"><label>Max Tokens</label><input type="number" step="100" min="100" max="16000" value=${s[name].maxTokens} onInput=${e => setNested(name + '.maxTokens', parseInt(e.target.value) || 4000)} /></div>
    </div>
  `;

  return html`
    <div class="modal-overlay" onClick=${e => { if (e.target === e.currentTarget) showSettings.value = false; }}>
      <div class="modal">
        <div class="flex items-center justify-between mb-3">
          <h2>Settings</h2>
          <button class="btn btn-ghost" onClick=${() => showSettings.value = false}>✕</button>
        </div>
        <div class="callout callout-warn text-sm mb-3">⚠️ API keys are stored in browser localStorage in plaintext. Do not use this on a shared device.</div>

        <div class="field mb-3">
          <label>
            <input type="checkbox" checked=${s.criticEnabled} onInput=${e => setNested('criticEnabled', e.target.checked)} style="margin-right:6px" />
            Enable critic pass (LLM dialect check after generation)
          </label>
        </div>

        ${slot('composer', 'Composer Slot (song generation)')}
        ${slot('critic', 'Critic Slot (dialect verification)')}

        <div class="mt-3 flex gap-2">
          <button class="btn btn-primary" onClick=${() => showSettings.value = false}>Done</button>
          <button class="btn btn-secondary" onClick=${() => {
            if (confirm('Reset settings to defaults?')) settings.value = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
          }}>Reset to Defaults</button>
        </div>
      </div>
    </div>
  `;
}

function LexiconEditor() {
  if (!showLexicon.value) return null;
  return html`
    <div class="modal-overlay" onClick=${e => { if (e.target === e.currentTarget) showLexicon.value = false; }}>
      <div class="modal" style="max-width:700px">
        <div class="flex items-center justify-between mb-3">
          <h2>Lexicon</h2>
          <button class="btn btn-ghost" onClick=${() => showLexicon.value = false}>✕</button>
        </div>
        <div class="text-sm text-dim mb-3">Pahari vocabulary used in prompt assembly and contamination scan. Built-in entries are read-only.</div>
        <table class="lex-table">
          <tr><th>Pahari</th><th>Gloss</th><th>Avoid</th><th>Tags</th></tr>
          ${LEXICON.map(e => html`
            <tr>
              <td><strong>${e.pahari}</strong></td>
              <td>${e.gloss_en}</td>
              <td class="rtl">${e.avoid?.join(', ') || ''}</td>
              <td class="rtl">${e.tags?.join(', ') || ''}</td>
            </tr>
          `)}
          ${_storage.userLexicon?.map((e, i) => html`
            <tr>
              <td><strong>${e.pahari}</strong> <span class="badge badge-info">user</span></td>
              <td>${e.gloss_en}</td>
              <td class="rtl">${e.avoid?.join(', ') || ''}</td>
              <td><button class="btn btn-ghost btn-sm" onClick=${() => {
                _storage.userLexicon.splice(i, 1);
                saveStorage();
                showLexicon.value = false;
                setTimeout(() => showLexicon.value = true, 50);
              }}>✕</button></td>
            </tr>
          `)}
        </table>
        <button class="btn btn-secondary btn-sm mt-3" onClick=${() => {
          const pahari = prompt('Pahari word:');
          if (!pahari) return;
          const gloss = prompt('English gloss:');
          if (!gloss) return;
          const avoid = prompt('Words to avoid (comma-separated):');
          if (!_storage.userLexicon) _storage.userLexicon = [];
          _storage.userLexicon.push({ pahari, gloss_en: gloss, avoid: avoid ? avoid.split(',').map(s => s.trim()) : [] });
          saveStorage();
          showLexicon.value = false;
          setTimeout(() => showLexicon.value = true, 50);
        }}>+ Add word</button>
      </div>
    </div>
  `;
}

function HistoryPanel() {
  const items = history.value;
  if (!items.length) return html`
    <div class="card">
      <div class="card-header"><h3>History</h3></div>
      <div class="text-sm text-dim">No songs yet. Generate one!</div>
    </div>
  `;

  return html`
    <div class="card">
      <div class="card-header">
        <h3>History</h3>
        <div class="flex gap-2">
          <button class="btn btn-ghost btn-sm" title="Export all" onClick=${() => {
            const blob = new Blob([JSON.stringify({ schemaVersion: 2, settings: settings.value, history: history.value, userLexicon: _storage.userLexicon }, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bitti-bol-export.json'; a.click();
          }}>📤</button>
          <button class="btn btn-ghost btn-sm" title="Import" onClick=${() => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = async () => {
              try {
                const text = await input.files[0].text();
                const data = JSON.parse(text);
                if (data.schemaVersion !== 2) { alert('Invalid schema version'); return; }
                if (data.history) history.value = data.history;
                if (data.settings) settings.value = { ...settings.value, ...data.settings };
                if (data.userLexicon) _storage.userLexicon = data.userLexicon;
                saveStorage();
              } catch (e) { alert('Import failed: ' + e.message); }
            };
            input.click();
          }}>📥</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        ${items.map(s => html`
          <div class="history-item" onClick=${() => {
            songTitle.value = s.title;
            songLyrics.value = s.lyrics;
            songStyle.value = s.style;
            songReport.value = s.report || null;
            scanHits.value = runContaminationScan(s.lyrics);
          }}>
            <div class="history-item-info">
              <div class="history-item-title">${s.title}</div>
              <div class="history-item-meta">${s.topic} · ${new Date(s.createdAt).toLocaleDateString()}</div>
              ${s.report?.scan?.filter(h => h.severity === 'high').length ? html`<span class="badge badge-high">⚠</span>` : ''}
            </div>
            <button class="btn btn-ghost btn-sm" onClick=${e => { e.stopPropagation(); history.value = history.value.filter(h => h.id !== s.id); }}>✕</button>
          </div>
        `)}
      </div>
    </div>
  `;
}

function App() {
  const isLoading = computed(() => pipelineStep.value === 'composing' || pipelineStep.value === 'critiquing' || pipelineStep.value === 'repairing');

  return html`
    <div class="app">
      <div class="left-panel">
        <${Header} />
        <${InputForm} />
        <${PipelineTracker} />
        <${HistoryPanel} />
      </div>
      <div class="right-panel">
        ${songTitle.value || songLyrics.value || songStyle.value ? html`
          <${EditorBlock} label="Title" value=${songTitle} maxLen=${SUNO_RULES.limits.title} />
          <${EditorBlock} label="Style" value=${songStyle} maxLen=${SUNO_RULES.limits.style} placeholder="Genre, vocals, instruments, tempo, mood" />
          <${EditorBlock}
            label="Lyrics"
            value=${songLyrics}
            maxLen=${SUNO_RULES.limits.lyrics}
            mono=${true}
            placeholder="[Intro]..."
            extra=${html`<${ContaminationPanel} />`}
          />
          <${ValidationReport} />
        ` : html`
          <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;gap:12px">
            <div style="font-size:3rem">🎵</div>
            <h2 style="color:var(--text-dim);font-size:1.1rem">Enter a topic and generate your song</h2>
            <div class="text-sm text-muted">Lyrics in Mahasuvi Pahari · Style for Suno v5.5</div>
            <${LexiconEditor} />
          </div>
        `}
      </div>
    </div>
    ${showSettings.value ? html`<${SettingsModal} />` : ''}
    ${showLexicon.value ? html`<${LexiconEditor} />` : ''}
  `;
}

function InputForm() {
  const isBusy = computed(() => pipelineStep.value !== 'idle' && pipelineStep.value !== 'done' && pipelineStep.value !== 'failed');

  const handleGenerate = () => {
    const topic = formTopic.value.trim();
    if (!topic) return;
    const prefs = {
      topic,
      mood: formMood.value,
      occasion: formOccasion.value,
      instruments: formInstruments.value,
      notes: formNotes.value,
    };
    runPipeline(prefs);
  };

  const handleCancel = () => {
    // In a real app we'd abort the fetch. For now just log.
  };

  return html`
    <div class="card">
      <h3 style="font-size:0.85rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px">New Song</h3>
      <div class="field">
        <label>Topic *</label>
        <textarea value=${formTopic} onInput=${e => formTopic.value = e.target.value} placeholder="e.g. chitte dandru, mountain love, apple harvest" style="min-height:50px"></textarea>
        <div class="hint">Type in any language — lyrics will be in Himachali Pahari</div>
      </div>
      <div class="field mt-2">
        <label>Mood</label>
        <input value=${formMood} onInput=${e => formMood.value = e.target.value} placeholder="e.g. romantic, celebratory, longing" />
      </div>
      <div class="field mt-2">
        <label>Occasion</label>
        <input value=${formOccasion} onInput=${e => formOccasion.value = e.target.value} placeholder="e.g. wedding, festival, harvest" />
      </div>
      <div class="field mt-2">
        <label>Preferred Instruments</label>
        <input value=${formInstruments} onInput=${e => formInstruments.value = e.target.value} placeholder="acoustic guitar, bansuri, dhol, chimta…" />
        <div class="hint">Base: acoustic guitar, bansuri, dhol, chimta</div>
      </div>
      <div class="field mt-2">
        <label>Additional Notes</label>
        <textarea value=${formNotes} onInput=${e => formNotes.value = e.target.value} placeholder="Any extra guidance…" style="min-height:40px"></textarea>
      </div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-primary w-full" onClick=${handleGenerate} disabled=${isBusy || !formTopic.value.trim()}>
          ${isBusy ? '⏳ Working…' : '🎵 Generate'}
        </button>
      </div>
    </div>
  `;
}

// === MOUNT ===
render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
