<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<title>Bitti Bol — Himachali Pahari Song Studio</title>
<style>
:root {
  --bg-body: #f4f0e8; --bg-card: #fbf9f4; --bg-input: #ffffff; --bg-soft: #fbfaf6;
  --text-main: #3a3128; --text-dim: #a89a84; --text-muted: #b5a993; --text-soft: #9c8f78;
  --accent: #c0472a; --accent-hover: #a83c22; --success: #4f7a3f; --warn-fg: #8a6d1a;
  --border: #e6dfd0; --border-light: #eee5d5; --border-input: #e0d8c6;
  --radius: 8px; --radius-lg: 12px;
  --font: 'IBM Plex Sans', system-ui, sans-serif; --mono: 'IBM Plex Mono', ui-monospace, monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-body);color:var(--text-main);line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover);text-decoration:underline}
textarea,input,select,button{font-family:inherit;font-size:inherit;color:inherit}
::selection{background:#f2d3c8;color:#26211a}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#d8cebb;border-radius:6px;border:2px solid var(--bg-body)}
::-webkit-scrollbar-thumb:hover{background:#c7bca6}
@keyframes bbpulse{0%,100%{box-shadow:0 0 0 0 rgba(192,71,42,.35)}50%{box-shadow:0 0 0 6px rgba(192,71,42,0)}}
@keyframes bbspin{to{transform:rotate(360deg)}}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-header h3{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#26211a}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:disabled{background:#e0d0c4;color:#a08c7e;opacity:1}
.form-label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-soft);margin-bottom:5px}
.form-input,.form-textarea{width:100%;background:#fff;border:1px solid var(--border-input);border-radius:8px;padding:8px 11px;font-size:13px;outline:none}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(192,71,42,.12)}
.form-textarea{resize:vertical;font-size:14px;padding:9px 11px;line-height:1.5}
.form-hint{font-size:11px;color:var(--text-dim);margin-top:5px}
.form-hint-sm{font-size:10px;color:var(--text-muted);margin-top:4px}
.btn-primary:hover:not(:disabled){background:var(--accent-hover)}
.btn-secondary{background:#fff;color:#6b6152;border:1px solid var(--border-input)}
.btn-secondary:hover:not(:disabled){background:var(--bg-soft)}
.btn-ghost{background:transparent;color:var(--text-dim);padding:6px}
.btn-ghost:hover{color:var(--text-main)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--accent)!important}
.char-count{font-family:var(--mono);font-size:10.5px;font-variant-numeric:tabular-nums}
.char-count.ok{color:#b0a48f}
.char-count.warn{color:var(--warn-fg)}
.char-count.over{color:var(--accent)}
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:960px){
  .chk-grid{grid-template-columns:1fr}
}
.callout-error{background:#f8e5df;border:1px solid #eec6ba;border-left:3px solid var(--accent);border-radius:8px;padding:11px 13px}
.grid-layout{flex:1;display:grid;gap:16px;align-items:start;padding:20px 28px;max-width:1420px;width:100%;margin:0 auto;grid-template-areas:"form pipe pipe" "form song scan" "hist song scan";grid-template-rows:auto auto 1fr}
.grid-layout.editorial{grid-template-columns:300px minmax(0,1fr) 340px}
.grid-layout.studio{grid-template-columns:320px minmax(0,1fr) 360px}
@media(max-width:960px){.grid-layout.editorial,.grid-layout.studio{grid-template-columns:1fr!important;grid-template-areas:"form""pipe""song""scan""hist"!important}}
.callout-error strong{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);font-weight:600;display:block;margin-bottom:3px}
.callout-error div:last-child{font-size:12.5px;color:#5e4a42;line-height:1.5}
</style>
</head>
<body>
<div id="app"></div>
<script src="config.js"></script>
<script src="bitti-core.global.js"></script>
<script src="lexicon.js"></script>
<script src="history.js" onerror="console.log('history.js not found — starting fresh')"></script>
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.26.4",
    "preact/": "https://esm.sh/preact@10.26.4/"
  }
}
</script>
<script type="module">
import { h, render, Fragment } from 'preact';
import htm from 'https://esm.sh/htm@3.1.1';
import { signal, computed, effect } from 'https://esm.sh/@preact/signals@2.0.1?external=preact';
const html = htm.bind(h);

let core;
try { core = await import('./bitti-core.js'); } catch { core = null; }
const C = () => core || window.__BITTIBOL_CORE;

const LEXICON = window.__BITTIBOL_LEXICON || (C() ? C().LEXICON : []);
const CONTAMINATION_RULES = C() ? C().CONTAMINATION_RULES : [];
const SUNO_RULES = C() ? C().SUNO_RULES : { limits: { lyrics: 5000, style: 1000, title: 100 }, requiredSections: ['[Intro]', '[Verse', '[Chorus]'], recommendedSections: ['[Bridge]', '[Outro]'], styleRules: { mustContain: ['naati', 'dhol', 'nagara'], bpm: { min: 90, max: 105 }, forbidPhrases: ['crisp snare on the backbeat', 'crisp snare', 'backbeat'] } };
const SONG_PATTERNS = C() ? C().SONG_PATTERNS : { structure: ['Intro', 'Verse 1', 'Chorus', 'Verse 2', 'Chorus', 'Bridge', 'Verse 3', 'Verse 4', 'Chorus', 'Outro'], form: 'O…/Ho… call-and-answer', chorusRule: 'identical hook text' };
const PROMPT_FRAGMENTS = C() ? C().PROMPT_FRAGMENTS : {};

const STORAGE_KEY = 'bitti-bol:v2';
const LEGACY_KEY = 'bitti-bol-history';
const DEFAULT_SETTINGS = {
  composer: { baseUrl: 'https://opencode.ai/zen/go/v1', apiKey: '', model: 'deepseek-v4-flash', temperature: 0.85, maxTokens: 4000 },
  critic: { baseUrl: 'https://opencode.ai/zen/go/v1', apiKey: '', model: 'deepseek-v4-flash', temperature: 0.2, maxTokens: 2000 },
  criticEnabled: true, sameAsCritic: true, corsProxy: '',
};
function historyFileName() { return 'history.js'; }
function historyFileContent(arr) { return 'window.__BITTIBOL_HISTORY = ' + JSON.stringify(arr, null, 2) + ';\n'; }
function downloadHistory(arr) {
  const blob = new Blob([historyFileContent(arr)], { type: 'application/javascript' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = historyFileName(); a.click();
}

function migrateV1History() {
  try {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (!raw) return [];
    const old = JSON.parse(raw);
    if (!Array.isArray(old)) return [];
    return old.map(s => ({
      id: s.id || crypto.randomUUID(), createdAt: s.generated_at || new Date().toISOString(),
      title: s.title || 'Untitled', lyrics: s.lyrics?.content || '', style: s.style?.content || '',
      topic: s.topic || '', prefs: {},
      report: { mechanical: { warnings: [], isValid: true }, scan: [], critic: null, repair: null },
      pipelineVersion: 1,
    }));
  } catch { return []; }
}

let _storage = { schemaVersion: 2, settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS)), userLexicon: [] };
let _v2localHistory = [];
try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === 'object' && parsed.schemaVersion === 2) {
      _storage = { ..._storage, ...parsed, settings: { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) } };
      if (Array.isArray(parsed.history)) _v2localHistory = parsed.history;
    }
  }
} catch {}
if (typeof window.__BITTIBOL_CONFIG !== 'undefined') {
  const cfg = window.__BITTIBOL_CONFIG;
  if (cfg.composer) { if (cfg.composer.apiKey) _storage.settings.composer.apiKey = cfg.composer.apiKey; if (cfg.composer.baseUrl) _storage.settings.composer.baseUrl = cfg.composer.baseUrl; if (cfg.composer.model) _storage.settings.composer.model = cfg.composer.model; }
  if (cfg.critic) { if (cfg.critic.apiKey) _storage.settings.critic.apiKey = cfg.critic.apiKey; if (cfg.critic.baseUrl) _storage.settings.critic.baseUrl = cfg.critic.baseUrl; if (cfg.critic.model) _storage.settings.critic.model = cfg.critic.model; }
  if (cfg.corsProxy) _storage.settings.corsProxy = cfg.corsProxy;
}
let initialHistory;
if (typeof window.__BITTIBOL_HISTORY !== 'undefined' && window.__BITTIBOL_HISTORY.length) { initialHistory = window.__BITTIBOL_HISTORY; }
else if (_v2localHistory.length) { initialHistory = _v2localHistory; setTimeout(() => downloadHistory(initialHistory), 500); }
else { initialHistory = migrateV1History(); if (initialHistory.length) setTimeout(() => downloadHistory(initialHistory), 500); }

function saveStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(_storage)); } catch {} }

const settings = signal(_storage.settings);
const formTopic = signal('');
const formMood = signal('');
const formOccasion = signal('');
const formInstruments = signal('');
const formNotes = signal('');
const pipelineStep = signal('idle');
const pipelineError = signal(null);
const pipelineSteps = signal([]);
const songTitle = signal('');
const songLyrics = signal('');
const songStyle = signal('');
const songReport = signal(null);
const scanHits = signal([]);
const showSettings = signal(false);
const showLexicon = signal(false);
const showExportImport = signal(false);
const history = signal(initialHistory);
const copyFeedback = signal({ title: false, style: false, lyrics: false });
const layoutMode = signal('editorial');
const editMode = signal(false);
const hoveredHit = signal(null);

effect(() => { _storage.settings = settings.value; saveStorage(); });
let prevHistoryJson = JSON.stringify(history.value);
effect(() => {
  const json = JSON.stringify(history.value);
  if (json === prevHistoryJson) return;
  prevHistoryJson = json;
  downloadHistory(history.value);
});

let scanTimer = null;
function scheduleScan(text) {
  clearTimeout(scanTimer);
  if (!text.trim()) { scanHits.value = []; return; }
  scanTimer = setTimeout(() => {
    if (C()) scanHits.value = C().runContaminationScan(text);
  }, 400);
}

const STAGES = [
  { key: 'compose', label: 'Compose', blurb: 'LLM writes the song' },
  { key: 'validate', label: 'Validate', blurb: 'Suno structure rules' },
  { key: 'scan', label: 'Scan', blurb: 'Dialect contamination' },
  { key: 'critic', label: 'Critic', blurb: 'LLM authenticity check' },
  { key: 'repair', label: 'Repair', blurb: 'Targeted dialect fixes' },
];

function pushStep(name, status, msg) {
  const stages = pipelineSteps.value;
  const existing = stages.find(s => s.name === name);
  if (existing) { existing.status = status; existing.message = msg || ''; pipelineSteps.value = [...stages]; }
  else { pipelineSteps.value = [...stages, { name, status, message: msg || '' }]; }
}

async function runPipeline(prefs) {
  const c = C(); if (!c) { pipelineError.value = { errorKind: 'load_error', message: 'Core module not loaded. Check that bitti-core.js exists.' }; return; }
  pipelineError.value = null;
  pipelineSteps.value = [];
  pushStep('compose', 'active', 'Calling composer…');

  const withProxy = (cfg) => settings.value.corsProxy ? { ...cfg, corsProxy: settings.value.corsProxy } : cfg;
  const prompts = c.assemblePrompt(prefs);
  const result = await c.llmCall(withProxy(settings.value.composer), 'composer', prompts.system, prompts.user);
  if (!result.ok) {
    pushStep('compose', 'failed', result.message);
    pipelineError.value = result;
    return;
  }
  const d = result.data;
  if (!d.title || !d.lyrics || !d.style) {
    pushStep('compose', 'failed', 'Incomplete: missing title/lyrics/style');
    pipelineError.value = { errorKind: 'bad_json', message: 'Model returned incomplete data. Try again.' };
    return;
  }
  pushStep('compose', 'done', '');
  songTitle.value = d.title; songLyrics.value = d.lyrics; songStyle.value = d.style;
  scanHits.value = c.runContaminationScan(d.lyrics);

  pushStep('validate', 'active', '');
  const mech = c.validateMechanical(d.lyrics, d.style);
  pushStep('validate', 'done', mech.warnings.length ? (mech.warnings.length + ' note' + (mech.warnings.length !== 1 ? 's' : '')) : 'clean');

  pushStep('scan', 'active', '');
  const scan = c.runContaminationScan(d.lyrics);
  const highHits = scan.filter(h => h.severity === 'high').length;
  pushStep('scan', 'done', scan.length ? (highHits + ' high · ' + (scan.length - highHits) + ' med') : 'clean');

  let critic = null;
  if (settings.value.criticEnabled) {
    pushStep('critic', 'active', '');
    const cp = c.assembleCriticPrompt(d.lyrics);
    const cr = await c.llmCall(withProxy(settings.value.critic), 'critic', cp.system, cp.user);
    if (cr.ok) {
      critic = cr.data;
      const conf = (critic.confidence || 0);
      pushStep('critic', 'done', (critic.is_authentic ? 'authentic' : 'issues') + ' · ' + conf.toFixed(2));
    } else {
      pushStep('critic', 'skipped', 'unavailable');
    }
  } else {
    pushStep('critic', 'skipped', 'disabled');
  }

  let repairApplied = false, afterHigh = highHits, finalLyrics = d.lyrics;
  const needRepair = (critic && critic.is_authentic === false && (critic.confidence || 0) < 0.7) || highHits > 0;
  if (needRepair) {
    pushStep('repair', 'active', 'Applying fixes…');
    const issues = [];
    for (const h of scan) issues.push('- Line ' + h.lineNo + ': "' + h.match + '" (' + h.language + ') → ' + h.suggestion);
    if (critic && critic.issues) for (const iss of critic.issues) issues.push('- "' + (iss.excerpt || '') + '": ' + (iss.problem || '') + ' → ' + (iss.suggestion || ''));
    const rp = 'The following lyrics have dialect issues. Fix ONLY the flagged constructions with the suggested Pahari forms. Keep the title, structure, tags, and all other lines byte-identical. Return the same JSON shape {title, lyrics, style}.\n\nOriginal lyrics:\n' + d.lyrics + '\n\nIssues:\n' + issues.join('\n');
    const rr = await c.llmCall(withProxy(settings.value.composer), 'composer', 'You are a Himachali Pahari dialect editor. ' + c.PROMPT_FRAGMENTS.dialectRequirement, rp);
    if (rr.ok && rr.data.lyrics && rr.data.lyrics.length) {
      finalLyrics = rr.data.lyrics; repairApplied = true;
      afterHigh = c.runContaminationScan(finalLyrics).filter(h => h.severity === 'high').length;
      pushStep('repair', 'done', 'high ' + highHits + ' → ' + afterHigh);
    } else {
      pushStep('repair', 'done', rr.ok ? 'kept original' : 'failed · kept original');
    }
  } else {
    pushStep('repair', 'skipped', 'nothing to fix');
  }

  const finalScan = c.runContaminationScan(finalLyrics);
  const report = { mechanical: mech, scan: finalScan, critic, repair: repairApplied ? { applied: true, beforeHigh: highHits, afterHigh } : null };
  const record = {
    id: crypto.randomUUID(), createdAt: new Date().toISOString(), title: d.title, lyrics: finalLyrics,
    style: d.style, topic: prefs.topic, prefs, report, pipelineVersion: 2,
  };
  songLyrics.value = finalLyrics; scanHits.value = finalScan; songReport.value = report;
  history.value = [record, ...history.value].slice(0, 50);
}

// === COMPONENTS ===

function CharCounter({ text, limit }) {
  const len = (text || '').length;
  const cls = len > limit ? 'over' : len > limit * 0.9 ? 'warn' : 'ok';
  return html`<span class="char-count ${cls}">${len} / ${limit}</span>`;
}

function StageList() {
  const sts = pipelineSteps.value;
  const ed = layoutMode.value === 'editorial';
  const pal = (status) => {
    const m = { idle: { dot: '#ece4d3', ic: '#b0a48f', label: '#a89a84' }, active: { dot: '#c0472a', ic: '#fff', label: '#26211a' }, done: { dot: '#4f7a3f', ic: '#fff', label: '#26211a' }, failed: { dot: '#c0472a', ic: '#fff', label: '#c0472a' }, skipped: { dot: '#e4ddcd', ic: '#b0a48f', label: '#b0a48f' } };
    return m[status] || m.idle;
  };
  const iconC = (stg, i) => stg.status === 'done' ? '✓' : stg.status === 'failed' ? '!' : stg.status === 'skipped' ? '–' : stg.status === 'active' ? '' : String(i + 1);
  const allDone = sts.some(s => s.status !== 'idle');
  return html`
    <div style="display:${ed ? 'flex' : 'flex'};flex-direction:${ed ? 'row' : 'column'};flex-wrap:${ed ? 'wrap' : 'nowrap'};gap:2px;align-items:${ed ? 'stretch' : 'stretch'}">
      ${STAGES.map((d, i) => {
        const stg = sts.find(s => s.name === d.key) || { status: 'idle', message: '' };
        const p = pal(stg.status);
        const sub = stg.message || d.blurb;
        return html`
          <div style="display:flex;align-items:${ed ? 'stretch' : 'flex-start'};flex-direction:${ed ? 'row' : 'column'}">
            ${i > 0 ? html`<div style="${ed ? 'width:16px;height:2px;background:#e2d9c7;align-self:center;margin:0 2px;flex-shrink:0' : 'width:2px;height:14px;background:#e2d9c7;margin-left:15px'}"></div>` : ''}
            <div style="display:flex;align-items:center;gap:${ed ? '9px' : '10px'};padding:${ed ? '6px 8px' : '5px 6px'}">
              <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:${p.dot};display:flex;align-items:center;justify-content:center;animation:${stg.status === 'active' ? 'bbpulse 1.3s ease-in-out infinite' : 'none'}">
                ${stg.status === 'active' ? html`<div style="display:block;width:11px;height:11px;border:2px solid rgba(255,255,255,0.45);border-top-color:#fff;border-radius:50%;animation:bbspin .7s linear infinite"></div>` : html`<span style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:${p.ic}">${iconC(stg, i)}</span>`}
              </div>
              <div style="min-width:0">
                <div style="font-size:12.5px;font-weight:600;color:${p.label};line-height:1.2">${d.label}</div>
                <div style="font-size:10.5px;color:#b0a48f;line-height:1.35">${sub}</div>
              </div>
            </div>
          </div>
        `;
      })}
    </div>
  `;
}

function InputForm() {
  const isBusy = computed(() => pipelineSteps.value.some(s => s.status === 'active'));
  const handleGenerate = () => {
    const topic = formTopic.value.trim();
    if (!topic || isBusy.value) return;
    runPipeline({ topic, mood: formMood.value, occasion: formOccasion.value, instruments: formInstruments.value, notes: formNotes.value });
  };
  return html`<section class="card">
      <div class="card-header">
        <h2>New Song</h2>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text-muted)">01</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:11px">
        <div>
          <label class="form-label">Topic <span style="color:var(--accent)">*</span></label>
          <textarea class="form-textarea" value=${formTopic} onInput=${e => formTopic.value = e.target.value} placeholder="chitte dandru · mountain love · apple harvest" style="min-height:54px"></textarea>
          <p class="form-hint">Type in any language — lyrics come back in Mahasuvi Pahari.</p>
        </div>
        <div>
          <label class="form-label">Mood</label>
          <input class="form-input" value=${formMood} onInput=${e => formMood.value = e.target.value} placeholder="romantic · longing · celebratory"/>
        </div>
        <div>
          <label class="form-label">Occasion</label>
          <input class="form-input" value=${formOccasion} onInput=${e => formOccasion.value = e.target.value} placeholder="wedding · festival · harvest"/>
        </div>
        <div>
          <label class="form-label">Instruments</label>
          <input class="form-input" value=${formInstruments} onInput=${e => formInstruments.value = e.target.value} placeholder="bansuri · dhol · chimta · acoustic guitar"/>
          <p class="form-hint-sm">Base: acoustic guitar, bansuri, dhol, chimta</p>
        </div>
        <div>
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" value=${formNotes} onInput=${e => formNotes.value = e.target.value} placeholder="Any extra guidance\u2026" style="min-height:40px"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:16px" onClick=${handleGenerate} disabled=${isBusy.value || !formTopic.value.trim()}>${isBusy.value ? 'Generating\u2026' : 'Generate song'}</button>
    </section>`;
}

function ErrorBanner() {
  const err = pipelineError.value;
  if (!err) return null;
  return html`
    <div class="callout-error">
      <strong>${err.errorKind}</strong>
      <div>${err.message}</div>
      ${err.errorKind === 'auth' || err.errorKind === 'cors_or_network' ? html`<button onClick=${() => showSettings.value = true} style="margin-top:8px;background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;padding:0">Open Settings \u2192</button>` : ''}
    </div>
  `;
}

function PipelineCard() {
  const sts = pipelineSteps.value;
  const anyDone = sts.some(s => s.status !== 'idle');
  const anyActive = sts.some(s => s.status === 'active');
  let label = 'Idle', bg = '#efe9dc', fg = '#a89a84';
  if (pipelineError.value) { label = 'Failed'; bg = '#f6e0d9'; fg = '#c0472a'; }
  else if (anyActive) { label = 'Running'; bg = '#f6e3db'; fg = '#c0472a'; }
  else if (anyDone) { label = 'Complete'; bg = '#e6efdd'; fg = '#4f7a3f'; }
  return html`
    <section style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px;min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">

      </div>

      <${ErrorBanner} />
    </section>
  `;
}

function LyricsReadMode() {
  const c = C();
  if (!c || !songLyrics.value) return null;
  const segs = c.segmentLyrics(songLyrics.value, scanHits.value);
  const hovered = hoveredHit.value;
  return html`
    <div style="padding:22px 26px;font-family:var(--mono);font-size:13px;line-height:1.9;color:#33291f;background:linear-gradient(var(--bg-card),var(--bg-card))">
      ${segs.map(ln => {
        if (ln.type === 'tag') return html`<div style="display:flex;align-items:center;gap:10px;margin:16px 0 6px"><span style="font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);white-space:nowrap">${ln.text}</span><span style="flex:1;height:1px;background:#e8dfce"></span></div>`;
        if (ln.type === 'blank') return html`<div style="height:10px"></div>`;
        return html`<div style="min-height:1.9em">${ln.segments.map(sg => {
          if (!sg.hit) return html`<span>${sg.text}</span>`;
          const hi = sg.severity === 'high';
          const on = sg.idx === hovered;
          const uc = hi ? '#c0472a' : '#a9791a';
          const bg = on ? (hi ? '#f0c6b7' : '#ecd6a4') : (hi ? '#f7ddd3' : '#f4e8cc');
          return html`<mark onMouseEnter=${() => hoveredHit.value = sg.idx} onMouseLeave=${() => hoveredHit.value = null} style="background:${bg};border-bottom:2px solid ${uc};border-radius:3px;padding:0 2px;cursor:pointer;color:#26211a;box-shadow:${on ? '0 0 0 2px ' + uc : 'none'};transition:background .12s,box-shadow .12s">${sg.text}</mark>`;
        })}</div>`;
      })}
    </div>
  `;
}

function ContaminationPanel() {
  const hits = scanHits.value;
  const c = C();
  if (!hits.length && !songLyrics.value) return html`
    <section style="grid-area:scan;min-width:0">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;position:sticky;top:92px;padding:26px 18px;text-align:center">
        <div style="font-size:13px;font-weight:600;color:#b0a48f">Dialect scan</div>
        <div style="font-size:11.5px;color:#b0a48f;margin-top:6px">Results appear after generation.</div>
      </div>
    </section>
  `;
  const highCount = hits.filter(h => h.severity === 'high').length;
  const medCount = hits.length - highCount;
  let badgeBg = '#e6efdd', badgeFg = '#4f7a3f', badgeLabel = 'clean';
  if (highCount > 0) { badgeBg = '#f6e0d9'; badgeFg = '#c0472a'; badgeLabel = highCount + ' high'; }
  else if (medCount > 0) { badgeBg = '#f5ecd3'; badgeFg = '#8a6d1a'; badgeLabel = medCount + ' medium'; }
  const hovered = hoveredHit.value;
  return html`
    <section style="grid-area:scan;min-width:0">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;position:sticky;top:92px">
        <div style="padding:16px 18px;border-bottom:1px solid var(--border-light)">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <h2 style="font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#26211a">Dialect scan</h2>
            <span style="font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;padding:3px 9px;border-radius:20px;background:${badgeBg};color:${badgeFg}">${badgeLabel}</span>
          </div>
          <p style="font-size:11px;color:var(--text-dim);margin-top:5px;line-height:1.45">Flags Hindi / Punjabi words that break Pahari authenticity. Hover a hit to find it in the lyrics.</p>
        </div>
        ${hits.length === 0 ? html`
          <div style="padding:26px 18px;text-align:center">
            <div style="width:38px;height:38px;border-radius:50%;background:#e6efdd;display:flex;align-items:center;justify-content:center;margin:0 auto 10px"><span style="color:#4f7a3f;font-size:19px;font-weight:700">\u2713</span></div>
            <div style="font-size:13px;font-weight:600;color:#4f7a3f">Reads as authentic Pahari</div>
            <div style="font-size:11.5px;color:var(--text-dim);margin-top:3px">No Hindi or Punjabi drift detected</div>
          </div>
        ` : html`
          <div style="padding:12px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 260px);overflow-y:auto">
            ${hits.map((h, i) => {
              const hi = h.severity === 'high';
              const on = i === hovered;
              const accent = hi ? '#c0472a' : '#a9791a';
              return html`
                <div onMouseEnter=${() => hoveredHit.value = i} onMouseLeave=${() => hoveredHit.value = null} style="border:1px solid ${on ? accent : 'var(--border-light)'};border-left:3px solid ${accent};border-radius:8px;padding:9px 11px;background:${on ? '#fff' : 'var(--bg-soft)'};transition:border-color .12s,background .12s">
                  <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px">
                    <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:#26211a">${h.match}</span>
                    <span style="font-family:var(--mono);font-size:9px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;color:#fff;background:${accent};padding:1px 6px;border-radius:4px">${h.language}</span>
                    <span style="font-family:var(--mono);font-size:10px;color:#b0a48f">line ${h.lineNo}</span>
                  </div>
                  <div style="font-size:11px;color:var(--text-soft);line-height:1.4;font-family:var(--mono)">${h.line.length > 54 ? h.line.slice(0, 54) + '\u2026' : h.line}</div>
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:7px">
                    <span style="font-size:12px;color:#4f7a3f;font-family:var(--mono)">\u2192 ${h.suggestion}</span>
                    <button onClick=${() => { if (c) { songLyrics.value = c.applyReplacement(songLyrics.value, h.pattern, h.suggestion); scheduleScan(songLyrics.value); }}} style="flex-shrink:0;font-size:11px;font-weight:600;padding:4px 11px;border:1px solid #d3c6a8;background:#fff;color:var(--warn-fg);border-radius:6px;cursor:pointer">Apply fix</button>
                  </div>
                </div>
              `;
            })}
          </div>
        `}
      </div>
    </section>
  `;
}

function ChecksGrid() {
  const rep = songReport.value;
  if (!rep) return null;
  const mech = rep.mechanical;
  const critic = rep.critic;
  const repair = rep.repair;
  const mechWarnings = (mech && mech.warnings || []).map(w => ({
    message: w.message,
    dotStyle: 'flex-shrink:0;width:7px;height:7px;border-radius:50%;margin-top:5px;background:' + (w.severity === 'high' ? '#c0472a' : '#a9791a'),
  }));
  const criticIssues = (critic && critic.issues || []).slice(0, 4).map(iss => ({ text: (iss.excerpt ? iss.excerpt + ' \u2014 ' : '') + (iss.problem || '') + (iss.suggestion ? ' \u2192 ' + iss.suggestion : '') }));
  const criticVerdict = critic ? (critic.is_authentic ? '\u2713 Authentic \u00b7 confidence ' + (critic.confidence || 0).toFixed(2) : '\u2717 Issues found \u00b7 confidence ' + (critic.confidence || 0).toFixed(2)) : '';
  return html`
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px">Checks</div>
      <div class="chk-grid">
        <div style="background:var(--bg-soft);border:1px solid var(--border-light);border-radius:9px;padding:12px 14px">
          <div style="font-size:11px;font-weight:600;color:#6b6152;margin-bottom:7px">Suno structure</div>
          ${mechWarnings.length === 0 ? html`<div style="font-size:12.5px;color:#4f7a3f;display:flex;align-items:center;gap:6px"><span style="font-weight:700">\u2713</span> All mechanical checks passed</div>` : html`
            <div style="display:flex;flex-direction:column;gap:6px">${mechWarnings.map(w => html`<div style="display:flex;gap:7px;font-size:11.5px;line-height:1.45;color:#5e5344"><span style="${w.dotStyle}"></span><span>${w.message}</span></div>`)}</div>
          `}
        </div>
        <div style="background:var(--bg-soft);border:1px solid var(--border-light);border-radius:9px;padding:12px 14px">
          <div style="font-size:11px;font-weight:600;color:#6b6152;margin-bottom:7px">LLM critic</div>
          ${critic ? html`
            <div style="font-size:12.5px;font-weight:600;color:${critic.is_authentic ? '#4f7a3f' : '#c0472a'}">${criticVerdict}</div>
            ${criticIssues.map(iss => html`<div style="font-size:11px;color:#8a7d68;margin-top:5px;line-height:1.4">\u00b7 ${iss.text}</div>`)}
          ` : html`<div style="font-size:12px;color:#b0a48f">Not run for this song.</div>`}
          ${repair && repair.applied ? html`<div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--border-light);font-size:11.5px;color:#4f7a3f">Repair applied \u00b7 high hits ${repair.beforeHigh} \u2192 ${repair.afterHigh}</div>` : ''}
        </div>
      </div>
    </div>
  `;
}

            <button onClick=${() => copy('lyrics', songLyrics.value)} style="font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid var(--border-input);background:#fff;border-radius:7px;cursor:pointer;color:#6b6152">${copyFeedback.value.lyrics ? 'copied' : 'copy'}</button>

function HistoryPanel() {
  const items = history.value;
  if (!items.length) return html`
    <section style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px;min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="display:flex;align-items:baseline;gap:8px">
          <h2 style="font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#26211a">History</h2>
        </div>
      </div>
      <p style="font-size:12px;color:#b0a48f;line-height:1.5">No songs yet. Your generated songs collect here \u2014 a growing shelf of Pahari verse.</p>
    </section>
  `;
  return html`
    <section style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px;min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="display:flex;align-items:baseline;gap:8px">
          <h2 style="font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#26211a">History</h2>
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${items.length}</span>
        </div>
        <div style="display:flex;gap:4px">
          <button onClick=${() => {
            const blob = new Blob([JSON.stringify({ schemaVersion: 2, settings: settings.value, history: history.value, userLexicon: _storage.userLexicon }, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bitti-bol-songbook.json'; a.click();
          }} title="Export songbook" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-input);background:#fff;border-radius:6px;cursor:pointer;color:var(--text-soft)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M5 21h14"/></svg></button>
          <button onClick=${() => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = async () => {
              try {
                const text = await input.files[0].text();
                const data = JSON.parse(text);
                if (data.schemaVersion !== 2) { alert('Invalid schema version'); return; }
                if (data.history) history.value = data.history;
                if (data.settings) settings.value = { ...settings.value, ...data.settings };
                if (data.userLexicon) _storage.userLexicon = data.userLexicon;
                saveStorage();
              } catch (e) { alert('Import failed: ' + e.message); }
            };
            input.click();
          }} title="Import songbook" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-input);background:#fff;border-radius:6px;cursor:pointer;color:var(--text-soft)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m8 7 4-4 4 4"/><path d="M5 21h14"/></svg></button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:7px;max-height:400px;overflow-y:auto">
        ${items.map(s => {
          const highH = (s.report && s.report.scan || []).filter(h => h.severity === 'high').length;
          const critc = s.report && s.report.critic;
          const authentic = critc ? critc.is_authentic : (highH === 0);
          let dateStr = '';
          try { dateStr = new Date(s.createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); } catch {}
          return html`
            <div onClick=${() => {
              songTitle.value = s.title; songLyrics.value = s.lyrics; songStyle.value = s.style;
              songReport.value = s.report || null;
              if (C()) scanHits.value = C().runContaminationScan(s.lyrics);
              editMode.value = false;
            }} style="padding:9px 11px;border:1px solid var(--border-light);border-radius:9px;background:var(--bg-soft);cursor:pointer;transition:border-color .12s,background .12s">
              <div style="display:flex;align-items:center;gap:9px;min-width:0">
                <span style="flex-shrink:0;width:8px;height:8px;border-radius:50%;background:${authentic ? '#4f7a3f' : '#c0472a'}" title="${authentic ? 'passed dialect checks' : 'had high-severity hits'}"></span>
                <div style="min-width:0;flex:1">
                  <div style="font-size:13px;font-weight:600;color:#26211a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</div>
                  <div style="font-family:var(--mono);font-size:10px;color:#b0a48f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.topic || '').slice(0, 28)} \u00b7 ${dateStr}</div>
                </div>
                <button onClick=${e => { e.stopPropagation(); history.value = history.value.filter(h => h.id !== s.id); }} style="flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:#c7bca6;cursor:pointer;border-radius:5px;font-size:14px">\u2715</button>
              </div>
            </div>
          `;
        })}
      </div>
    </section>
  `;
}

      <div style="display:flex;flex-direction:column;gap:10px">
        <div><div style="font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);margin-bottom:4px">Base URL</div><input value=${s[name].baseUrl} onInput=${e => setNested(name + '.baseUrl', e.target.value)} style="width:100%;background:#fff;border:1px solid var(--border-input);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:var(--mono);outline:none"/></div>
        <div><div style="font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);margin-bottom:4px">API key</div><input type="password" value=${s[name].apiKey} onInput=${e => setNested(name + '.apiKey', e.target.value)} placeholder="sk-\u2026" style="width:100%;background:#fff;border:1px solid var(--border-input);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:var(--mono);outline:none"/></div>
        <div style="display:flex;gap:10px">
          <div style="flex:2"><div style="font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);margin-bottom:4px">Model</div><input value=${s[name].model} onInput=${e => setNested(name + '.model', e.target.value)} placeholder="deepseek-v4-flash" style="width:100%;background:#fff;border:1px solid var(--border-input);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:var(--mono);outline:none"/></div>
          <div style="flex:1"><div style="font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);margin-bottom:4px">Temp</div><input type="number" step="0.05" min="0" max="2" value=${s[name].temperature} onInput=${e => setNested(name + '.temperature', parseFloat(e.target.value) || 0.85)} style="width:100%;background:#fff;border:1px solid var(--border-input);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:var(--mono);outline:none"/></div>
          <div style="flex:1"><div style="font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);margin-bottom:4px">Max tok</div><input type="number" step="100" min="100" max="16000" value=${s[name].maxTokens} onInput=${e => setNested(name + '.maxTokens', parseInt(e.target.value) || 4000)} style="width:100%;background:#fff;border:1px solid var(--border-input);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:var(--mono);outline:none"/></div>
        </div>
      </div>
    </div>
  `;
  return html`
    <div onClick=${e => { if (e.target === e.currentTarget) showSettings.value = false; }} style="position:fixed;inset:0;background:rgba(38,33,26,0.42);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding:52px 20px;z-index:100;overflow-y:auto">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;box-shadow:0 24px 60px rgba(38,33,26,0.22)">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--border-light)">
          <div>
            <h2 style="font-size:16px;font-weight:700;color:#26211a">Settings</h2>
            <p style="font-size:11px;color:var(--text-dim);margin-top:2px">LLM endpoints for composer and critic</p>
          </div>
          <button onClick=${() => showSettings.value = false} style="width:30px;height:30px;border:1px solid var(--border-input);background:#fff;border-radius:7px;cursor:pointer;color:#6b6152;font-size:14px">\u2715</button>
        </div>
        <div style="padding:20px 22px;display:flex;flex-direction:column;gap:16px">
          <div style="background:#f8e5df;border:1px solid #eec6ba;border-radius:8px;padding:10px 12px;font-size:11.5px;color:#8a5648;line-height:1.5">API keys are stored in this browser's localStorage in plaintext. Don't use a shared device.</div>
          <label style="display:flex;align-items:center;gap:9px;font-size:13px;color:#3a3128;cursor:pointer">
            <input type="checkbox" checked=${s.criticEnabled} onChange=${e => setNested('criticEnabled', e.target.checked)} style="width:16px;height:16px;accent-color:#c0472a"/>
            Run the LLM critic pass after generation
          </label>
          <div style="border:1px solid var(--border-light);border-radius:10px;padding:12px 14px;background:var(--bg-soft)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <div style="font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft)">CORS Proxy</div>
              <span style="font-size:10px;color:var(--text-muted)">optional</span>
            </div>
            <input value=${s.corsProxy} onInput=${e => setNested('corsProxy', e.target.value)} placeholder="https://corsproxy.io/?" style="width:100%;background:#fff;border:1px solid var(--border-input);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:var(--mono);outline:none"/>
            <p style="font-size:10.5px;color:var(--text-dim);margin-top:5px;line-height:1.45">Prefix each API request with this URL. Needed when running from <code style="background:#efebde;padding:1px 4px;border-radius:4px;font-size:10px">file://</code> where CORS blocks direct fetch calls.</p>
          </div>
          ${slot('composer', 'Composer slot \u00b7 writes the song')}
          ${slot('critic', 'Critic slot \u00b7 verifies dialect')}
          <div style="display:flex;gap:10px;padding-top:2px">
            <button onClick=${() => showSettings.value = false} style="flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer">Done</button>
            <button onClick=${() => { if (confirm('Reset settings to defaults?')) settings.value = JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }} style="background:#fff;color:#6b6152;border:1px solid var(--border-input);border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer">Reset</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function LexiconModal() {
  if (!showLexicon.value) return null;
  const entries = [
    ...LEXICON.map(e => ({ pahari: e.pahari, gloss: e.gloss_en, avoid: (e.avoid || []).join(', '), isUser: false })),
    ...(_storage.userLexicon || []).map((e, i) => ({ pahari: e.pahari, gloss: e.gloss_en, avoid: (e.avoid || []).join(', '), isUser: true, onDelete: () => { _storage.userLexicon.splice(i, 1); saveStorage(); showLexicon.value = false; setTimeout(() => showLexicon.value = true, 50); } })),
  ];
  return html`
    <div class="modal" onClick=${e => { if (e.target === e.currentTarget) showLexicon.value = false; }} style="position:fixed;inset:0;background:rgba(38,33,26,0.42);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding:52px 20px;z-index:100;overflow-y:auto">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;box-shadow:0 24px 60px rgba(38,33,26,0.22)">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--border-light)">
          <div>
            <h2 style="font-size:16px;font-weight:700;color:#26211a">Lexicon</h2>
            <p style="font-size:11px;color:var(--text-dim);margin-top:2px">Vocabulary fed to the composer & the contamination scan</p>
          </div>
          <div style="display:flex;gap:8px">
            <button onClick=${() => {
              const pahari = prompt('Pahari word:'); if (!pahari) return;
              const gloss = prompt('English meaning:'); if (!gloss) return;
              const avoid = prompt('Words to avoid (comma-separated):') || '';
              if (!_storage.userLexicon) _storage.userLexicon = [];
              _storage.userLexicon.push({ pahari, gloss_en: gloss, avoid: avoid ? avoid.split(',').map(x => x.trim()).filter(Boolean) : [] });
              saveStorage(); showLexicon.value = false; setTimeout(() => showLexicon.value = true, 50);
            }} style="border:1px solid #d3c6a8;background:#fff;color:var(--warn-fg);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">+ Add word</button>
            <button onClick=${() => showLexicon.value = false} style="width:30px;height:30px;border:1px solid var(--border-input);background:#fff;border-radius:7px;cursor:pointer;color:#6b6152;font-size:14px">\u2715</button>
          </div>
        </div>
        <div style="padding:8px 22px 22px;max-height:60vh;overflow-y:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead>
              <tr>
                <th style="text-align:left;padding:9px 8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);border-bottom:1px solid var(--border)">Pahari</th>
                <th style="text-align:left;padding:9px 8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);border-bottom:1px solid var(--border)">Meaning</th>
                <th style="text-align:left;padding:9px 8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);border-bottom:1px solid var(--border)">Avoid</th>
                <th style="width:40px;border-bottom:1px solid var(--border)"></th>
              </tr>
            </thead>
            <tbody>
              ${entries.map(e => html`
                <tr>
                  <td style="padding:8px;border-bottom:1px solid #f0e9db;vertical-align:top"><span style="font-family:var(--mono);font-weight:600;color:#26211a">${e.pahari}</span>${e.isUser ? html`<span style="margin-left:6px;font-size:9px;background:#f6e3db;color:var(--accent);padding:1px 5px;border-radius:4px;font-weight:600">user</span>` : ''}</td>
                  <td style="padding:8px;border-bottom:1px solid #f0e9db;vertical-align:top;color:#5e5344">${e.gloss}</td>
                  <td style="padding:8px;border-bottom:1px solid #f0e9db;vertical-align:top;color:var(--text-dim);font-family:var(--mono);font-size:11.5px">${e.avoid}</td>
                  <td style="padding:8px;border-bottom:1px solid #f0e9db;vertical-align:top;text-align:right">${e.isUser ? html`<button onClick=${e.onDelete} style="border:none;background:none;color:#c7bca6;cursor:pointer;font-size:13px">\u2715</button>` : ''}</td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function App() {
  const ed = layoutMode.value === 'editorial';
  const cls = 'app grid-layout' + (ed ? ' editorial' : ' studio');
  return html`
    <div style="min-height:100vh;display:flex;flex-direction:column">
      <header style="display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 28px;border-bottom:1px solid var(--border);background:#faf7f0;position:sticky;top:0;z-index:20">
        <div style="display:flex;align-items:baseline;gap:14px;min-width:0">
          <div style="display:flex;align-items:baseline;gap:2px">
            <span style="font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--accent)">Bitti</span>
            <span style="font-size:22px;font-weight:700;letter-spacing:-.02em;color:#26211a"> Bol</span>
          </div>
          <span style="font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:var(--text-dim);white-space:nowrap">Himachali Pahari Song Studio</span>
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <div style="display:flex;align-items:center;gap:8px;padding-right:14px;border-right:1px solid var(--border)">
            <span style="font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)">Layout</span>
            <div style="display:flex;background:#efe9dc;border:1px solid var(--border-input);border-radius:8px;padding:3px;gap:2px">
              <button onClick=${() => layoutMode.value = 'editorial'} style="${ed ? 'padding:5px 12px;border:none;border-radius:6px;background:#fff;color:#26211a;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 1px 2px rgba(38,33,26,0.08)' : 'padding:5px 12px;border:none;border-radius:6px;background:transparent;color:#8a7d68;font-size:12px;font-weight:500;cursor:pointer'}">Manuscript</button>
              <button onClick=${() => layoutMode.value = 'studio'} style="${!ed ? 'padding:5px 12px;border:none;border-radius:6px;background:#fff;color:#26211a;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 1px 2px rgba(38,33,26,0.08)' : 'padding:5px 12px;border:none;border-radius:6px;background:transparent;color:#8a7d68;font-size:12px;font-weight:500;cursor:pointer'}">Console</button>
            </div>
          </div>
          <button onClick=${() => showLexicon.value = !showLexicon.value} title="Lexicon" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-input);background:#fbf9f4;border-radius:8px;cursor:pointer;color:#6b6152">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h11a3 3 0 0 1 3 3v13H7a3 3 0 0 0-3 3z"/><path d="M18 7a3 3 0 0 1 3-3v16"/></svg>
          </button>
          <button onClick=${() => showSettings.value = true} title="Settings" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-input);background:#fbf9f4;border-radius:8px;cursor:pointer;color:#6b6152">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>
      <main class="${cls}">
        <${InputForm} />
        <${PipelineCard} />
        <${SongCard} />
        <${ContaminationPanel} />
        <${HistoryPanel} />
      </main>
    </div>
    ${showSettings.value ? html`<${SettingsModal} />` : ''}
    ${showLexicon.value ? html`<${LexiconModal} />` : ''}
  `;
}

if (typeof window !== 'undefined') {
  window.__testSetSong = (title, lyrics, style) => {
    songTitle.value = title; songLyrics.value = lyrics; songStyle.value = style;
  };
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
