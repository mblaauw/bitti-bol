<style>:root {
  --bg-body: #efe8da; --bg-card: #fcf9f3; --bg-input: #ffffff; --bg-soft: #f6f0e5; --bg-rail: #f3ecdf;
  --text-main: #3a3128; --text-dim: #a89a84; --text-muted: #b5a993; --text-soft: #9c8f78; --ink: #26211a;
  --accent: #c0472a; --accent-hover: #a83c22; --accent-soft: #f4ddd2; --accent-tint: #faeee8;
  --success: #4f7a3f; --success-soft: #e6efdd; --warn-fg: #8a6d1a; --warn-soft: #f5ecd3;
  --border: #e6dfd0; --border-light: #eee5d5; --border-input: #ddd4c2; --border-strong: #d8cdb6;
  --radius-sm: 7px; --radius: 9px; --radius-lg: 13px; --radius-xl: 18px;
  --shadow-card: 0 1px 2px rgba(58,49,40,.04), 0 1px 1px rgba(58,49,40,.03);
  --shadow-pop: 0 24px 60px rgba(38,33,26,.22);
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', ui-monospace, monospace;
  --serif: 'IBM Plex Serif', Georgia, 'Times New Roman', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg-body); color: var(--text-main); line-height: 1.55; min-height: 100vh; -webkit-font-smoothing: antialiased; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }
textarea, input, select, button { font-family: inherit; font-size: inherit; color: inherit; }
::selection { background: #f2d3c8; color: var(--ink); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #d8cebb; border-radius: 6px; border: 2px solid var(--bg-body); }
::-webkit-scrollbar-thumb:hover { background: #c7bca6; }

@keyframes bbpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,71,42,.35); } 50% { box-shadow: 0 0 0 6px rgba(192,71,42,0); } }
@keyframes bbspin { to { transform: rotate(360deg); } }
@keyframes bbfade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.bb-fade { animation: bbfade .32s ease both; }

/* ---------- shared surfaces ---------- */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-card); }
.card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.panel-title { font-size: 12px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--ink); }
.eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); }
.badge { font-family: var(--mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }

/* ---------- buttons ---------- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s, color .15s, border-color .15s, transform .05s; white-space: nowrap; }
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-primary:disabled { background: #e3d5c9; color: #ab9787; }
.btn-secondary { background: #fff; color: #6b6152; border: 1px solid var(--border-input); }
.btn-secondary:hover:not(:disabled) { background: var(--bg-soft); }
.btn-ghost { background: transparent; color: var(--text-dim); padding: 6px; }
.btn-ghost:hover { color: var(--text-main); }
.btn-sm { padding: 5px 11px; font-size: 11px; }
.icon-btn { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border-input); background: #fbf9f4; border-radius: var(--radius); cursor: pointer; color: #6b6152; transition: background .15s, color .15s, border-color .15s; }
.icon-btn:hover { background: #fff; color: var(--ink); border-color: var(--border-strong); }
.chip-btn { flex-shrink: 0; font-family: var(--mono); font-size: 11px; padding: 5px 10px; border: 1px solid var(--border-input); background: #fff; border-radius: var(--radius-sm); cursor: pointer; color: #6b6152; transition: background .15s, border-color .15s; }
.chip-btn:hover { background: var(--bg-soft); border-color: var(--border-strong); }

/* ---------- forms ---------- */
.form-label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: .09em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 5px; }
.form-input, .form-textarea { width: 100%; background: #fff; border: 1px solid var(--border-input); border-radius: var(--radius); padding: 9px 12px; font-size: 13.5px; outline: none; transition: border-color .15s, box-shadow .15s; }
.form-input:focus, .form-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(192,71,42,.1); }
.form-textarea { resize: vertical; font-size: 14px; line-height: 1.5; }
.form-hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; line-height: 1.45; }
.form-hint-sm { font-size: 10.5px; color: var(--text-muted); margin-top: 5px; }
input, textarea, select { outline: none; transition: border-color .15s, box-shadow .15s; }

.char-count { font-family: var(--mono); font-size: 10.5px; font-variant-numeric: tabular-nums; }
.char-count.ok { color: #b0a48f; }
.char-count.warn { color: var(--warn-fg); }
.char-count.over { color: var(--accent); }

.callout-error { background: var(--accent-tint); border: 1px solid #eec6ba; border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 12px 14px; }
.callout-error strong { font-family: var(--mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; color: var(--accent); font-weight: 600; display: block; margin-bottom: 3px; }
.callout-error div:last-child { font-size: 12.5px; color: #5e4a42; line-height: 1.5; }

/* ---------- app shell ---------- */
.app-shell { min-height: 100vh; display: flex; flex-direction: column; }
.app-header { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 15px 30px; border-bottom: 1px solid var(--border); background: rgba(250,247,240,.9); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 30; }

/* ---------- workspace grid ---------- */
.app.workspace {
  flex: 1; display: grid; gap: 22px; align-items: start;
  padding: 26px 30px 60px; max-width: 1500px; width: 100%; margin: 0 auto;
  grid-template-columns: 344px minmax(0, 1fr) 340px;
  grid-template-areas: "compose stage scan";
}
.col-compose { grid-area: compose; display: flex; flex-direction: column; gap: 18px; position: sticky; top: 88px; }
.col-stage { grid-area: stage; display: flex; flex-direction: column; gap: 18px; min-width: 0; }
.col-scan { grid-area: scan; position: sticky; top: 88px; min-width: 0; }

@media (max-width: 1180px) {
  .app.workspace { grid-template-columns: 330px minmax(0, 1fr); grid-template-areas: "compose stage" "compose scan"; }
  .col-compose { position: sticky; top: 88px; }
  .col-scan { position: static; }
}
@media (max-width: 820px) {
  .app-header { padding: 14px 18px; }
  .app.workspace { grid-template-columns: 1fr; grid-template-areas: "compose" "stage" "scan"; padding: 18px 16px 48px; gap: 16px; }
  .col-compose, .col-scan { position: static; }
}

/* ---------- pipeline stepper ---------- */
.chk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 560px) { .chk-grid { grid-template-columns: 1fr; } }

/* ---------- lyrics song sheet ---------- */
.lyrics-sheet { padding: 26px 30px 30px; font-family: var(--serif); font-size: 16px; line-height: 1.95; color: #33291f; }
.lyrics-sheet .ly-line { min-height: 1.2em; }
.lyrics-sheet .ly-line.first { margin-top: 2px; }
.lyrics-sheet .ly-blank { height: 12px; }
.ly-section { display: flex; align-items: center; gap: 12px; margin: 22px 0 9px; }
.ly-section:first-child { margin-top: 0; }
.ly-section .ly-sec-label { font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
.ly-section .ly-sec-rule { flex: 1; height: 1px; background: #e8dfce; }
.ly-perf { font-family: var(--mono); font-size: 11.5px; letter-spacing: .02em; color: var(--text-muted); font-style: italic; }
.ly-chorus-line { border-left: 2px solid var(--accent-soft); padding-left: 16px; margin-left: 1px; font-weight: 500; color: #2c2318; }
mark.ly-hit { border-radius: 3px; padding: 0 2px; cursor: pointer; color: var(--ink); transition: background .12s, box-shadow .12s; }

/* ---------- scan hit cards ---------- */
.hit-card { border: 1px solid var(--border-light); border-radius: var(--radius); padding: 10px 12px; background: var(--bg-soft); transition: border-color .12s, background .12s, box-shadow .12s; }
.hit-card:hover { background: #fff; }

/* ---------- history rows ---------- */
.hist-row { padding: 10px 12px; border: 1px solid var(--border-light); border-radius: var(--radius); background: var(--bg-soft); cursor: pointer; transition: border-color .12s, background .12s; }
.hist-row:hover { border-color: var(--border-strong); background: #fff; }

/* ---------- toggle (read/edit) ---------- */
.seg { display: flex; background: var(--bg-soft); border: 1px solid var(--border-input); border-radius: var(--radius-sm); padding: 2px; }
.seg button { padding: 5px 13px; border: none; border-radius: 6px; background: transparent; color: #8a7d68; font-size: 12px; font-weight: 500; cursor: pointer; transition: background .12s, color .12s, box-shadow .12s; }
.seg button.on { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(38,33,26,.08); }

/* ---------- modal ---------- */
.modal { position: fixed; inset: 0; background: rgba(38,33,26,.42); backdrop-filter: blur(3px); display: flex; align-items: flex-start; justify-content: center; padding: 52px 20px; z-index: 100; overflow-y: auto; animation: bbfade .2s ease both; }
.modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); width: 100%; box-shadow: var(--shadow-pop); }
.modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 20px 24px; border-bottom: 1px solid var(--border-light); }
</style>

function runContaminationScan(lyrics) {
  const hits = []; const lines = (lyrics || '').split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i]; const trimmed = line.trim();
    if (/^\[.*\]$/.test(trimmed)) continue;
    for (const rule of CONTAMINATION_RULES) {
      const re = new RegExp(rule.pattern, 'gi'); let m;
      while ((m = re.exec(line)) !== null) {
        hits.push({ match: m[0], col: m.index, line: line.trim(), lineNo: i + 1, language: rule.language, severity: rule.severity, suggestion: rule.suggestion, explanation: rule.explanation, pattern: rule.pattern });
        if (m.index === re.lastIndex) re.lastIndex++;
      }
    }
  }
  hits.sort((a, b) => (a.lineNo - b.lineNo) || (a.col - b.col) || (b.match.length - a.match.length));
  const deduped = []; const seen = {};
  for (const h of hits) { const key = h.lineNo + ':' + h.col; if (seen[key]) continue; seen[key] = true; deduped.push(h); }
  return deduped;
}

function applyReplacement(text, pattern, replacement, lineNo, col) {
  if (lineNo != null && col != null) {
    const lns = text.split('\n'); const idx = lineNo - 1;
    if (idx >= 0 && idx < lns.length) {
      const l = lns[idx]; const re = new RegExp(pattern, 'i'); const m = re.exec(l.slice(col));
      if (m) { const before = l.slice(0, col); const after = l.slice(col + m[0].length); lns[idx] = before + replacement + after; }
      return lns.join('\n');
    }
  }
  const re = new RegExp(pattern, 'gi'); return text.replace(re, replacement);
}

function segmentLyrics(lyrics, hits) {
  const lines = (lyrics || '').split('\n'); const byLine = {};
  (hits || []).forEach((h, idx) => { (byLine[h.lineNo] = byLine[h.lineNo] || []).push({ ...h, idx }); });
  return lines.map((line, i) => {
    const lineNo = i + 1; const trimmed = line.trim();
    if (/^\[.*\]$/.test(trimmed)) return { type: 'tag', text: trimmed };
    if (trimmed === '') return { type: 'blank' };
    const lh = (byLine[lineNo] || []).slice().sort((a, b) => a.col - b.col);
    if (!lh.length) return { type: 'line', segments: [{ text: line, hit: false }] };
    const segs = []; let pos = 0;
    for (const h of lh) {
      if (h.col < pos) continue;
      if (h.col > pos) segs.push({ text: line.slice(pos, h.col), hit: false });
      segs.push({ text: line.slice(h.col, h.col + h.match.length), hit: true, idx: h.idx, severity: h.severity, language: h.language, suggestion: h.suggestion });
      pos = h.col + h.match.length;
    }
    if (pos < line.length) segs.push({ text: line.slice(pos), hit: false });
    return { type: 'line', segments: segs };
  });
}

function validateMechanical(lyrics, style) {
  const warnings = [];
  const lc = lyrics.length;
  const sc = style.length;
  if (lc > SUNO_RULES.limits.lyrics) warnings.push({ code: 'lyrics_overflow', severity: 'high', message: 'Lyrics exceed ' + SUNO_RULES.limits.lyrics + ' chars (' + lc + '). Suno may truncate.' });
  if (sc > SUNO_RULES.limits.style) warnings.push({ code: 'style_overflow', severity: 'high', message: 'Style exceeds ' + SUNO_RULES.limits.style + ' chars (' + sc + '). Suno may truncate.' });
  for (const tag of SUNO_RULES.requiredSections) {
    if (tag === '[Verse') { if (!lyrics.match(/\[Verse\s*\d+\]/i)) warnings.push({ code: 'missing_' + tag, severity: 'high', message: 'Missing required section: [Verse N]' }); }
    else { if (!lyrics.includes(tag)) warnings.push({ code: 'missing_' + tag, severity: 'high', message: 'Missing required section: ' + tag }); }
  }
  for (const tag of SUNO_RULES.recommendedSections) {
    if (!lyrics.includes(tag)) warnings.push({ code: 'missing_' + tag, severity: 'medium', message: 'Consider adding ' + tag + ' for better suno structure' });
  }
  const chorusSections = []; const cls = lyrics.split('\n'); let inChorus = false; let currentChorus = [];
  for (const line of cls) {
    if (/\[Chorus\]/i.test(line) || /\[Chorus\s*\d*\]/i.test(line)) { if (inChorus && currentChorus.length) chorusSections.push(currentChorus.join('\n').trim()); inChorus = true; currentChorus = []; continue; }
    if (inChorus) { if (/^\[/.test(line.trim())) { if (currentChorus.length) chorusSections.push(currentChorus.join('\n').trim()); inChorus = false; currentChorus = []; continue; } currentChorus.push(line); }
  }
  if (inChorus && currentChorus.length) chorusSections.push(currentChorus.join('\n').trim());
  if (chorusSections.length > 1) { const n = chorusSections.map(c => c.replace(/\s+/g, ' ').trim()); const f = n[0]; for (let i = 1; i < n.length; i++) { if (n[i] !== f) warnings.push({ code: 'chorus_mismatch', severity: 'medium', message: 'Chorus ' + (i + 1) + ' differs from first Chorus. Suno v5.5 works best with identical hooks.' }); } }
  const styleLower = style.toLowerCase();
  const firstSentence = style.split(/[,.]/)[0]?.trim().toLowerCase() || '';
  if (!firstSentence.includes('himachali') && !firstSentence.includes('pahari')) { warnings.push({ code: 'style_language_hint', severity: 'medium', message: 'Style block should open with a language hint (e.g. "sung in Himachali Pahari")' }); }
  for (const word of SUNO_RULES.styleRules.mustContain) { if (!styleLower.includes(word)) warnings.push({ code: 'style_missing_' + word, severity: 'medium', message: 'Style block should mention "' + word + '" for authentic Pahari sound' }); }
  const bpmMatch = style.match(/\b(\d{2,3})\s*bpm\b/i);
  if (bpmMatch) { const bpm = parseInt(bpmMatch[1]); if (bpm < SUNO_RULES.styleRules.bpm.min || bpm > SUNO_RULES.styleRules.bpm.max) { warnings.push({ code: 'style_bpm', severity: 'medium', message: 'BPM ' + bpm + ' outside recommended range (' + SUNO_RULES.styleRules.bpm.min + '-' + SUNO_RULES.styleRules.bpm.max + ') for naati rhythm' }); } }
  else { warnings.push({ code: 'style_bpm_missing', severity: 'medium', message: 'Style block should include a BPM range within ' + SUNO_RULES.styleRules.bpm.min + '-' + SUNO_RULES.styleRules.bpm.max }); }
  for (const phrase of SUNO_RULES.styleRules.forbidPhrases) { if (styleLower.includes(phrase.toLowerCase())) warnings.push({ code: 'style_backbeat', severity: 'medium', message: 'Avoid "' + phrase + '" (bhangra attractor). Use "dhol" and "nagara" phrasing instead.' }); }
  return { warnings, isValid: warnings.filter(w => w.severity === 'high').length === 0 };
}

async function llmCall(cfg, slot, systemPrompt, userPrompt, { expectJson = true } = {}) {
  const timeoutMs = 180000;
  if (!cfg || !cfg.apiKey) return { ok: false, errorKind: 'auth', message: 'No API key configured for ' + slot + ' — set it in Settings.' };
  if (!cfg.baseUrl) return { ok: false, errorKind: 'auth', message: 'No base URL configured for ' + slot + ' — set it in Settings.' };
  const baseUrl = cfg.baseUrl.replace(/\/+$/, '');
  let url = baseUrl + '/chat/completions';
  if (cfg.corsProxy) { url = cfg.corsProxy + encodeURIComponent(url); }
  const isComposer = slot === 'composer';
  const body = { model: cfg.model || 'deepseek-v4-flash', messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }], temperature: cfg.temperature ?? (isComposer ? 0.85 : 0.2), max_tokens: cfg.maxTokens ?? 16384 };
  if (expectJson) body.response_format = { type: 'json_object' };
  const controller = new AbortController(); const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.apiKey }, body: JSON.stringify(body), signal: controller.signal });
    clearTimeout(timer);
    if (resp.status === 401 || resp.status === 403) { const msg = await resp.text().catch(() => ''); return { ok: false, errorKind: 'auth', message: 'Key rejected (' + resp.status + '). Verify your API key.' + (msg ? ' ' + msg.slice(0, 200) : '') }; }
    if (resp.status === 429) return { ok: false, errorKind: 'rate_limit', message: 'Rate limited. Wait a moment and retry.' };
    if (!resp.ok) { const msg = await resp.text().catch(() => ''); return { ok: false, errorKind: 'provider_error', message: 'Provider error (' + resp.status + ')' + (msg ? ': ' + msg.slice(0, 300) : '') }; }
    const data = await resp.json(); const content = data?.choices?.[0]?.message?.content; const finish = data?.choices?.[0]?.finish_reason;
    if (!content) { if (finish === 'length') return { ok: false, errorKind: 'bad_json', message: 'Response empty (max_tokens too short or reasoning ate tokens). Try increasing max_tokens.' }; return { ok: false, errorKind: 'bad_json', message: 'Empty response from model.' }; }
    if (!expectJson) return { ok: true, data: content };
    let json;
    try { const cleaned = content.replace(/^```(?:json)?\s*/, '').replace(/\s*```$/, '').trim(); json = JSON.parse(cleaned); } catch (e) { return { ok: false, errorKind: 'bad_json', message: 'Failed to parse response as JSON. Raw: ' + content.slice(0, 300) }; }
    return { ok: true, data: json };
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') return { ok: false, errorKind: 'timeout', message: 'Request timed out after ' + (timeoutMs / 1000) + 's.' };
    const msg = e.message || String(e);
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('CORS') || msg.includes('network')) return { ok: false, errorKind: 'cors_or_network', message: 'Network/CORS error. The provider may not allow browser calls. Set a proxy base URL in Settings.' };
    return { ok: false, errorKind: 'provider_error', message: msg };
  }
}

const POLL_INTERVAL = 5000;
const MAX_POLLS = 120;

async function submitGeneration(cfg, title, style, prompt, instrumental = false) {
  if (!cfg || !cfg.apiKey) return { ok: false, errorKind: 'auth', message: 'No API key configured for generation — set it in Settings.' };
  if (!cfg.baseUrl) return { ok: false, errorKind: 'auth', message: 'No base URL configured for generation — set it in Settings.' };
  const baseUrl = cfg.baseUrl.replace(/\/+$/, '');
  const callBackUrl = cfg.callBackUrl || 'https://example.com/suno-callback';
  const body = {
    customMode: true,
    instrumental,
    callBackUrl,
    model: cfg.model || 'V5_5',
    title,
    style: style || '',
    prompt,
  };
  try {
    const resp = await fetch(baseUrl + '/api/v1/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.apiKey },
      body: JSON.stringify(body),
    });
    const json = await resp.json();
    if (json.code !== 200) {
      const map = { 401: 'auth', 429: 'quota', 430: 'rate_limit', 413: 'too_long', 455: 'maintenance' };
      const kind = map[json.code] || 'provider_error';
      const msg = json.msg || 'Generation rejected (code ' + json.code + ')';
      return { ok: false, errorKind: kind, message: msg };
    }
    if (!json.data || !json.data.taskId) {
      return { ok: false, errorKind: 'provider_error', message: 'No taskId in response.' };
    }
    return { ok: true, data: { taskId: json.data.taskId } };
  } catch (e) {
    const msg = e.message || String(e);
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
      return { ok: false, errorKind: 'cors_or_network', message: 'Network/CORS error. The provider may not be reachable from the browser.' };
    }
    return { ok: false, errorKind: 'provider_error', message: msg };
  }
}

async function pollGeneration(cfg, taskId, onProgress) {
  const baseUrl = cfg.baseUrl.replace(/\/+$/, '');
  for (let i = 0; i < MAX_POLLS; i++) {
    await new Promise(r => setTimeout(r, POLL_INTERVAL));
    try {
      const resp = await fetch(baseUrl + '/api/v1/generate/record-info?taskId=' + encodeURIComponent(taskId), {
        headers: { 'Authorization': 'Bearer ' + cfg.apiKey },
      });
      const json = await resp.json();
      if (json.code !== 200) {
        return { ok: false, errorKind: 'provider_error', message: json.msg || 'Poll failed (code ' + json.code + ')' };
      }
      const d = json.data;
      if (!d) {
        return { ok: false, errorKind: 'provider_error', message: 'Empty poll response.' };
      }
      const status = d.status || '';
      if (status === 'SUCCESS' || status === 'TEXT_SUCCESS' || status === 'FIRST_SUCCESS') {
        const tracks = (d.response && d.response.sunoData) || [];
        if (tracks.length === 0) {
          if (i < 5) continue;
          return { ok: false, errorKind: 'provider_error', message: 'No tracks after generation completed.' };
        }
        return { ok: true, data: { status, tracks } };
      }
      if (status === 'CREATE_TASK_FAILED' || status === 'GENERATE_AUDIO_FAILED') {
        const errMsg = d.errorMessage || d.errorCode || 'Generation failed (' + status + ')';
        return { ok: false, errorKind: 'provider_error', message: errMsg };
      }
      if (status === 'SENSITIVE_WORD_ERROR') {
        return { ok: false, errorKind: 'content_policy', message: 'Content flagged by Suno policy. Try different lyrics.' };
      }
      if (status && status.includes('FAILED')) {
        return { ok: false, errorKind: 'provider_error', message: d.errorMessage || 'Generation failed (' + status + ')' };
      }
      if (onProgress) onProgress(status);
    } catch (e) {
      return { ok: false, errorKind: 'provider_error', message: e.message || String(e) };
    }
  }
  return { ok: false, errorKind: 'timeout', message: 'Generation timed out after ' + ((MAX_POLLS * POLL_INTERVAL) / 60000).toFixed(0) + ' min.' };
}

const STORAGE_KEY = 'bitti-bol:v2';
const LEGACY_KEY = 'bitti-bol-history';

  criticEnabled: true, corsProxy: '',
};

function migrateV1History() {
  try {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (!raw) return [];
    const old = JSON.parse(raw);
    if (!Array.isArray(old)) return [];
    return old.map(s => ({
      id: s.id || crypto.randomUUID(), createdAt: s.generated_at || new Date().toISOString(),
      title: s.title || 'Untitled', lyrics: s.lyrics?.content || '', style: s.style?.content || '',
      topic: s.topic || '', prefs: {},
      report: { mechanical: { warnings: [], isValid: true }, scan: [], critic: null, repair: null, iterations: 0 },
      pipelineVersion: 1,
    }));
  } catch { return []; }
}

let _storage = { schemaVersion: 2, settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS)), userLexicon: [], editMode: false };
let _v2localHistory = [];
try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === 'object' && parsed.schemaVersion === 2) {
      const savedSettings = parsed.settings || {};
      _storage = {
        ..._storage, ...parsed,
        settings: {
          ...DEFAULT_SETTINGS,
          composer: { ...DEFAULT_SETTINGS.composer, ...(savedSettings.composer || {}) },
          critic: { ...DEFAULT_SETTINGS.critic, ...(savedSettings.critic || {}) },
          generation: { ...DEFAULT_SETTINGS.generation, ...(savedSettings.generation || {}) },
          corsProxy: savedSettings.corsProxy ?? DEFAULT_SETTINGS.corsProxy,
          criticEnabled: savedSettings.criticEnabled ?? DEFAULT_SETTINGS.criticEnabled,
        },
      };
      if (Array.isArray(parsed.history)) _v2localHistory = parsed.history;
    }
  }
} catch {}
if (typeof window.__BITTIBOL_CONFIG !== 'undefined') {
  const cfg = window.__BITTIBOL_CONFIG;
  if (cfg.composer) { for (const k of ['apiKey', 'baseUrl', 'model', 'temperature', 'maxTokens']) { if (cfg.composer[k] != null) _storage.settings.composer[k] = cfg.composer[k]; } }
  if (cfg.critic) { for (const k of ['apiKey', 'baseUrl', 'model', 'temperature', 'maxTokens']) { if (cfg.critic[k] != null) _storage.settings.critic[k] = cfg.critic[k]; } }
  if (cfg.generation) { for (const k of ['apiKey', 'baseUrl', 'model', 'callBackUrl']) { if (cfg.generation[k] != null) _storage.settings.generation[k] = cfg.generation[k]; } }
  if (cfg.corsProxy) _storage.settings.corsProxy = cfg.corsProxy;
}
let initialHistory;
if (_v2localHistory.length) { initialHistory = _v2localHistory; }
else { initialHistory = migrateV1History(); }

function saveStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(_storage)); } catch {} }

const settings = signal(_storage.settings);
const formTopic = signal('');
const formMood = signal('');
const formOccasion = signal('');
const formInstruments = signal('');
const formNotes = signal('');
const pipelineError = signal(null);
const pipelineSteps = signal([]);

let scanTimer = null;
function scheduleScan(text) {
  clearTimeout(scanTimer);
  if (!text.trim()) { scanHits.value = []; return; }
  scanTimer = setTimeout(() => {
    scanHits.value = runContaminationScan(text);
  }, 400);
}

const STAGES = [
  { key: 'compose', label: 'Compose', blurb: 'LLM writes the song' },
  { key: 'validate', label: 'Validate', blurb: 'Suno structure rules' },
  { key: 'scan', label: 'Scan', blurb: 'Dialect contamination' },
  { key: 'critic', label: 'Critic', blurb: 'LLM authenticity check' },
  { key: 'revise', label: 'Revise', blurb: 'Fix issues from critic feedback' },
  { key: 'verify', label: 'Verify', blurb: 'Second critic pass' },
];

function pushStep(name, status, msg) {
  const stages = pipelineSteps.value;
  const existing = stages.find(s => s.name === name);
  if (existing) { existing.status = status; existing.message = msg || ''; pipelineSteps.value = [...stages]; }
  else { pipelineSteps.value = [...stages, { name, status, message: msg || '' }]; }
}

async function generateAudio(title, style, lyrics, instrumental) {
  const prevGens = audioGen.value.generations || [];
  audioGen.value = { status: 'submitting', taskId: null, tracks: [], error: null, generations: prevGens, activeGen: -1 };
  const cfg = settings.value.generation;
  const sub = await submitGeneration(cfg, title, style, lyrics, instrumental);
  if (!sub.ok) {
    audioGen.value = { status: 'error', taskId: null, tracks: [], error: sub, generations: prevGens, activeGen: -1 };
    return;
  }
  const taskId = sub.data.taskId;
  audioGen.value = { status: 'polling', taskId, tracks: [], error: null, generations: prevGens, activeGen: -1 };
  const result = await pollGeneration(cfg, taskId, (status) => {
    audioGen.value = { ...audioGen.value, status: status === 'SUCCESS' ? 'done' : 'polling' };
  });
  if (!result.ok) {
    audioGen.value = { status: 'error', taskId, tracks: [], error: result, generations: prevGens, activeGen: -1 };
    return;
  }
  const model = cfg.model || 'V5_5';
  const entry = { tracks: result.data.tracks, taskId, createdAt: new Date().toISOString(), model, instrumental };
  const gens = [...prevGens, entry];
  const activeGen = gens.length - 1;
  audioGen.value = { status: 'done', taskId, tracks: result.data.tracks, error: null, generations: gens, activeGen };
  const saveAudio = (record) => ({ ...record, audio: gens });
  const hId = selectedHistoryId.value;
  if (hId) {
    const idx = history.value.findIndex(r => r.id === hId);
    if (idx !== -1) {
      const copy = [...history.value];
      copy[idx] = saveAudio(copy[idx]);
      history.value = copy;
      return;
    }
  }
  const matchIdx = history.value.findIndex(r => r.title === title && r.lyrics === lyrics && r.style === style);
  if (matchIdx !== -1) {
    const copy = [...history.value];
    copy[matchIdx] = saveAudio(copy[matchIdx]);
    history.value = copy;
  } else {
    const record = {
      id: crypto.randomUUID(), createdAt: new Date().toISOString(), title, lyrics,
      style: style || '', topic: '', prefs: {}, report: null, pipelineVersion: 3,
      audio: gens,
    };
    selectedHistoryId.value = record.id;
    history.value = [record, ...history.value].slice(0, 50);
  }
}

function selectGeneration(index) {
  const gens = audioGen.value.generations;
  if (!gens || index < 0 || index >= gens.length) return;
  audioGen.value = { ...audioGen.value, activeGen: index, tracks: gens[index].tracks, taskId: gens[index].taskId };
}

async function runPipeline(prefs) {
  if (typeof window !== 'undefined' && window.__testFailApi) {
    pipelineError.value = { ok: false, errorKind: 'auth', message: 'Test: No API key configured' };
    pushStep('compose', 'failed', 'Test: No API key configured');
    return;
  }
  pipelineError.value = null;
  pipelineSteps.value = [];
  pushStep('compose', 'active', 'Calling composer…');

  const withProxy = (cfg) => settings.value.corsProxy ? { ...cfg, corsProxy: settings.value.corsProxy } : cfg;
  const prompts = PROMPT_FRAGMENTS.assembleComposerPrompt(prefs, userLexiconSig.value);
  const result = await llmCall(withProxy(settings.value.composer), 'composer', prompts.system, prompts.user);
  if (!result.ok) {
    pushStep('compose', 'failed', result.message);
    pipelineError.value = result;
    return;
  }
  const d = result.data;
  if (!d.title || !d.lyrics || !d.style) {
    pushStep('compose', 'failed', 'Incomplete: missing title/lyrics/style');
    pipelineError.value = { errorKind: 'bad_json', message: 'Model returned incomplete data. Try again.' };
    return;
  }
  pushStep('compose', 'done', '');
  songTitle.value = d.title; songLyrics.value = d.lyrics; songStyle.value = d.style;
  scanHits.value = runContaminationScan(d.lyrics);

  pushStep('validate', 'active', '');
  let mech = validateMechanical(d.lyrics, d.style);
  pushStep('validate', 'done', mech.warnings.length ? (mech.warnings.length + ' note' + (mech.warnings.length !== 1 ? 's' : '')) : 'clean');

  pushStep('scan', 'active', '');
  const scan = runContaminationScan(d.lyrics);
  const highHits = scan.filter(h => h.severity === 'high').length;
  pushStep('scan', 'done', scan.length ? (highHits + ' high · ' + (scan.length - highHits) + ' med') : 'clean');

  let critic = null;
  if (settings.value.criticEnabled) {
    pushStep('critic', 'active', '');
    const cp = PROMPT_FRAGMENTS.assembleCriticPrompt(d.lyrics, d.title, d.style);
    const cr = await llmCall(withProxy(settings.value.critic), 'critic', cp.system, cp.user);
    if (cr.ok) {
      critic = cr.data;
      const conf = (critic.confidence || 0);
      pushStep('critic', 'done', (critic.is_authentic ? 'authentic' : 'issues') + ' · ' + conf.toFixed(2));
    } else {
      pushStep('critic', 'skipped', 'unavailable');
    }
  } else {
    pushStep('critic', 'skipped', 'disabled');
  }

  let iterations = 0;
  let finalLyrics = d.lyrics;
  let finalCritic = critic;
  const MAX_ITERATIONS = 2;

  const shouldRevise = settings.value.criticEnabled && critic && critic.confidence !== undefined &&
    (critic.confidence < 0.8 || !critic.is_authentic);

  if (shouldRevise) {
    pushStep('revise', 'active', '');

    const issues = [];
    for (const h of scan) {
      if (h.severity === 'high') {
        issues.push(`- Line ${h.lineNo}: "${h.match}" (${h.language}) → ${h.suggestion}`);
      }
    }
    if (critic.issues) {
      for (const iss of critic.issues) {
        issues.push(`- "${iss.excerpt || ''}": ${iss.problem || ''} → ${iss.suggestion || ''}`);
      }
    }

    const conf = critic.confidence || 0;
    let revisionType;
    if (conf < 0.6) revisionType = 'full';
    else if (conf < 0.8) revisionType = 'targeted';
    else revisionType = 'scrub';

    const typeGuide = revisionType === 'full'
      ? 'Perform a thorough revision addressing all issues.'
      : revisionType === 'targeted'
        ? 'Focus on the specific issues listed below. Keep everything else intact.'
        : 'Quick vocabulary scrub — fix only the specific word substitutions listed below.';

    const rp = `${PROMPT_FRAGMENTS.iterativeImprovement}

ORIGINAL SONG:
Title: ${d.title}
Style: ${d.style}
Lyrics:
${d.lyrics}

REVISION TYPE: ${revisionType}
${typeGuide}

ISSUES TO ADDRESS:
${issues.join('\n')}

${PROMPT_FRAGMENTS.outputContract}`;

    const rr = await llmCall(withProxy(settings.value.composer), 'composer',
      PROMPT_FRAGMENTS.dialectRequirement, rp);
    if (rr.ok && rr.data && rr.data.lyrics && rr.data.lyrics.length) {
      finalLyrics = rr.data.lyrics;
      iterations = 1;
      const afterReviseScan = runContaminationScan(finalLyrics);
      const afterHigh = afterReviseScan.filter(h => h.severity === 'high').length;
      pushStep('revise', 'done', `${revisionType} · high ${highHits}→${afterHigh}`);

      if (settings.value.criticEnabled && iterations < MAX_ITERATIONS) {
        pushStep('verify', 'active', '');
        const vp = PROMPT_FRAGMENTS.assembleCriticPrompt(finalLyrics, d.title, d.style);
        const vr = await llmCall(withProxy(settings.value.critic), 'critic', vp.system, vp.user);
        if (vr.ok) {
          finalCritic = vr.data;
          const vconf = finalCritic.confidence || 0;
          pushStep('verify', 'done', (finalCritic.is_authentic ? 'authentic' : 'issues') + ' · ' + vconf.toFixed(2));
        } else {
          pushStep('verify', 'skipped', 'unavailable');
        }
      } else {
        pushStep('verify', 'skipped', 'disabled');
      }
    } else {
      pushStep('revise', 'done', 'kept original');
      pushStep('verify', 'skipped', 'not needed');
    }
  } else {
    pushStep('revise', 'skipped', critic ? 'approved' : 'no critic data');
    pushStep('verify', 'skipped', 'not needed');
  }

  const finalScan = runContaminationScan(finalLyrics);
  const report = { mechanical: mech, scan: finalScan, critic: finalCritic, iterations };
  const recordId = crypto.randomUUID();
  const record = {
    id: recordId, createdAt: new Date().toISOString(), title: d.title, lyrics: finalLyrics,
    style: d.style, topic: prefs.topic, prefs, report, pipelineVersion: 3,
    metadata: { prompt_version: PROMPT_VERSION, generated_at: new Date().toISOString() },
  };
  songLyrics.value = finalLyrics; scanHits.value = finalScan; songReport.value = report;
  selectedHistoryId.value = recordId;
  history.value = [record, ...history.value].slice(0, 50);
}

function ChecksGrid() {
  const rep = songReport.value;
  if (!rep) return null;
  const mech = rep.mechanical;
  const critic = rep.critic;
  const repair = rep.repair;
  const iterations = rep.iterations;
  const mechWarnings = (mech && mech.warnings || []).map(w => ({
    message: w.message,
    dotStyle: 'flex-shrink:0;width:7px;height:7px;border-radius:50%;margin-top:6px;background:' + (w.severity === 'high' ? '#c0472a' : '#a9791a'),
  }));
  const criticIssues = (critic && critic.issues || []).slice(0, 4).map(iss => ({ text: (iss.excerpt ? iss.excerpt + ' — ' : '') + (iss.problem || '') + (iss.suggestion ? ' → ' + iss.suggestion : '') }));
  const criticVerdict = critic ? (critic.is_authentic ? '✓ Authentic · confidence ' + (critic.confidence || 0).toFixed(2) : '✗ Issues found · confidence ' + (critic.confidence || 0).toFixed(2)) : '';
  return html`
    <div class="card" style="padding:20px 22px">
      <div class="eyebrow" style="margin-bottom:14px">Checks</div>
      <div class="chk-grid">
        <div style="background:var(--bg-soft);border:1px solid var(--border-light);border-radius:var(--radius);padding:14px 16px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.02em;color:#6b6152;margin-bottom:9px;text-transform:uppercase">Suno structure</div>
          ${mechWarnings.length === 0 ? html`<div style="font-size:12.5px;color:var(--success);display:flex;align-items:center;gap:6px"><span style="font-weight:700">✓</span> All mechanical checks passed</div>` : html`
            <div style="display:flex;flex-direction:column;gap:7px">${mechWarnings.map(w => html`<div style="display:flex;gap:8px;font-size:11.5px;line-height:1.45;color:#5e5344"><span style="${w.dotStyle}"></span><span>${w.message}</span></div>`)}</div>
          `}
        </div>
        <div style="background:var(--bg-soft);border:1px solid var(--border-light);border-radius:var(--radius);padding:14px 16px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.02em;color:#6b6152;margin-bottom:9px;text-transform:uppercase">LLM critic</div>
          ${critic ? html`
            <div style="font-size:12.5px;font-weight:600;color:${critic.is_authentic ? 'var(--success)' : 'var(--accent)'}">${criticVerdict}</div>
            ${criticIssues.map(iss => html`<div style="font-size:11px;color:#8a7d68;margin-top:6px;line-height:1.4">· ${iss.text}</div>`)}
          ` : html`<div style="font-size:12px;color:#b0a48f">Not run for this song.</div>`}
          ${iterations ? html`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light);font-size:11.5px;color:var(--success)">Revised (${iterations} iteration${iterations > 1 ? 's' : ''})</div>` : repair && repair.applied ? html`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light);font-size:11.5px;color:var(--success)">Repair applied · high hits ${repair.beforeHigh} → ${repair.afterHigh}</div>` : ''}
        </div>
      </div>
    </div>
  `;
}

function ContaminationPanel() {
  const hits = scanHits.value;
  if (!hits.length && !songLyrics.value) return html`
    <div class="card" style="padding:26px 20px;text-align:center">
      <div class="panel-title" style="color:var(--text-muted)">Dialect scan</div>
      <div style="font-size:11.5px;color:#b0a48f;margin-top:7px;line-height:1.5">Results appear after<br/>generation.</div>
    </div>
  `;
  const highCount = hits.filter(h => h.severity === 'high').length;
  const medCount = hits.length - highCount;
  let badgeBg = 'var(--success-soft)', badgeFg = 'var(--success)', badgeLabel = 'clean';
  if (highCount > 0) { badgeBg = 'var(--accent-soft)'; badgeFg = 'var(--accent)'; badgeLabel = highCount + ' high'; }
  else if (medCount > 0) { badgeBg = 'var(--warn-soft)'; badgeFg = 'var(--warn-fg)'; badgeLabel = medCount + ' medium'; }
  const hovered = hoveredHit.value;
  const fixAll = () => {
    const sorted = [...hits].sort((a, b) => (b.lineNo - a.lineNo) || (b.col - a.col));
    const lns = songLyrics.value.split('\n');
    for (const h of sorted) {
      const idx = h.lineNo - 1;
      if (idx >= 0 && idx < lns.length) {
        const l = lns[idx];
        lns[idx] = l.slice(0, h.col) + h.suggestion + l.slice(h.col + h.match.length);
      }
    }
    songLyrics.value = lns.join('\n');
    scheduleScan(songLyrics.value);
  };
  return html`
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 18px;border-bottom:1px solid var(--border-light)">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <h2 class="panel-title">Dialect scan</h2>
          <div style="display:flex;align-items:center;gap:8px">
            ${hits.length > 1 ? html`<button onClick=${fixAll} style="font-size:11px;font-weight:600;padding:4px 11px;border:1px solid #d3c6a8;background:#fff;color:var(--warn-fg);border-radius:var(--radius-sm);cursor:pointer">Fix all (${hits.length})</button>` : ''}
            <span class="badge" style="background:${badgeBg};color:${badgeFg}">${badgeLabel}</span>
          </div>
        </div>
        <p style="font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.5">Flags Hindi / Punjabi words that break Pahari authenticity. Hover a hit to find it in the lyrics.</p>
      </div>
      ${hits.length === 0 ? html`
        <div style="padding:30px 18px;text-align:center">
          <div style="width:42px;height:42px;border-radius:50%;background:var(--success-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><span style="color:var(--success);font-size:21px;font-weight:700">✓</span></div>
          <div style="font-size:13.5px;font-weight:600;color:var(--success)">Reads as authentic Pahari</div>
          <div style="font-size:11.5px;color:var(--text-dim);margin-top:4px">No Hindi or Punjabi drift detected</div>
        </div>
      ` : html`
        <div style="padding:12px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 210px);overflow-y:auto">
          ${hits.map((h, i) => {
            const hi = h.severity === 'high';
            const on = i === hovered;
            const accent = hi ? '#c0472a' : '#a9791a';
            return html`
              <div class="hit-card" onMouseEnter=${() => hoveredHit.value = i} onMouseLeave=${() => hoveredHit.value = null} style="border-color:${on ? accent : 'var(--border-light)'};border-left:3px solid ${accent};box-shadow:${on ? '0 2px 8px rgba(58,49,40,.08)' : 'none'}">
                <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px">
                  <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink)">${h.match}</span>
                  <span style="font-family:var(--mono);font-size:9px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;color:#fff;background:${accent};padding:1px 6px;border-radius:4px">${h.language}</span>
                  <span style="font-family:var(--mono);font-size:10px;color:#b0a48f;margin-left:auto">line ${h.lineNo}</span>
                </div>
                <div style="font-size:11px;color:var(--text-soft);line-height:1.4;font-family:var(--mono)">${h.line.length > 54 ? h.line.slice(0, 54) + '…' : h.line}</div>
                <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px">
                  <span style="font-size:12px;color:var(--success);font-family:var(--mono)">→ ${h.suggestion}</span>
                  <button onClick=${() => { const lns = songLyrics.value.split('\n'); const idx = h.lineNo - 1; if (idx >= 0 && idx < lns.length) { const l = lns[idx]; lns[idx] = l.slice(0, h.col) + h.suggestion + l.slice(h.col + h.match.length); songLyrics.value = lns.join('\n'); scheduleScan(songLyrics.value); } }} style="flex-shrink:0;font-size:11px;font-weight:600;padding:4px 11px;border:1px solid #d3c6a8;background:#fff;color:var(--warn-fg);border-radius:var(--radius-sm);cursor:pointer">Apply fix</button>
                </div>
              </div>
            `;
          })}
        </div>
      `}
    </div>
  `;
}

function ErrorBanner() {

  return html`

      <strong>${activeErr.errorKind}</strong>

      ${(activeErr.errorKind === 'auth' || activeErr.errorKind === 'cors_or_network' || activeErr.errorKind === 'quota') && !err ? html`<button onClick=${() => showSettings.value = true} style="margin-top:8px;background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;padding:0">Open Settings \u2192</button>` : ''}
    </div>
  `;
}

function normalizeHistoryItem(record) {
  const report = record.report || {};
  if (report.iterations !== undefined) {
    return { ...record, wasRepaired: report.iterations > 0, iterationCount: report.iterations };
  }
  if (report.repair) {
    return { ...record, wasRepaired: report.repair.applied || false, iterationCount: report.repair.beforeHigh || 1 };
  }
  return { ...record, wasRepaired: false, iterationCount: 0 };
}

function HistoryPanel() {
  const items = history.value.map(normalizeHistoryItem);
  const header = (count) => html`
    <div class="card-header" style="margin-bottom:${count ? '12px' : '10px'}">
      <div style="display:flex;align-items:baseline;gap:8px">
        <h2 class="panel-title">History</h2>
        ${count ? html`<span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${count}</span>` : ''}
      </div>
      ${count ? html`
      <div style="display:flex;gap:5px">
        <button class="icon-btn" style="width:28px;height:28px" title="Export songbook" onClick=${() => {
          const blob = new Blob([JSON.stringify({ schemaVersion: 2, settings: settings.value, history: history.value, userLexicon: userLexiconSig.value }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bitti-bol-songbook.json'; a.click();
        }}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M5 21h14"/></svg></button>
        <button class="icon-btn" style="width:28px;height:28px" title="Import songbook" onClick=${() => {
          const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
          input.onchange = async () => {
            try {
              const text = await input.files[0].text();
              const data = JSON.parse(text);
              if (data.schemaVersion !== 2) { alert('Invalid schema version'); return; }
              if (data.history) {
                const byId = {};
                history.value.forEach(h => byId[h.id] = h);
                for (const h of data.history) byId[h.id || crypto.randomUUID()] = h;
                history.value = Object.values(byId).slice(0, 50);
              }
              if (data.settings) {
                settings.value = {
                  ...settings.value, ...data.settings,
                  composer: { ...(settings.value.composer || {}), ...(data.settings.composer || {}) },
                  critic: { ...(settings.value.critic || {}), ...(data.settings.critic || {}) },
                };
              }
              if (data.userLexicon) {
                const byWord = {};
                userLexiconSig.value.forEach(e => byWord[e.pahari] = e);
                for (const e of data.userLexicon) byWord[e.pahari] = e;
                userLexiconSig.value = Object.values(byWord);
              }
              saveStorage();
            } catch (e) { alert('Import failed: ' + e.message); }
          };
          input.click();
        }}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m8 7 4-4 4 4"/><path d="M5 21h14"/></svg></button>
      </div>` : ''}
    </div>
  `;
  if (!items.length) return html`
    <section class="card">
      ${header(0)}
      <p style="font-size:12px;color:#b0a48f;line-height:1.55">No songs yet. Your generated songs collect here — a growing shelf of Pahari verse.</p>
    </section>
  `;
  return html`
    <section class="card">
      ${header(items.length)}
      <div style="display:flex;flex-direction:column;gap:7px;max-height:360px;overflow-y:auto">
        ${items.map(s => {
          const highH = (s.report && s.report.scan || []).filter(h => h.severity === 'high').length;
          const critc = s.report && s.report.critic;
          const authentic = critc ? critc.is_authentic : (highH === 0);
          let dateStr = '';
          try { dateStr = new Date(s.createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); } catch {}
          return html`
            <div class="hist-row" onClick=${() => {
              const prevId = selectedHistoryId.value;
              if (prevId && prevId !== s.id) {
                const prevIdx = history.value.findIndex(r => r.id === prevId);
                if (prevIdx !== -1) {
                  const copy = [...history.value];
                  copy[prevIdx] = { ...copy[prevIdx], title: songTitle.value, lyrics: songLyrics.value, style: songStyle.value, updatedAt: new Date().toISOString() };
                  history.value = copy;
                }
              }
              songTitle.value = s.title; songLyrics.value = s.lyrics; songStyle.value = s.style;
              songReport.value = s.report || null;
              scanHits.value = runContaminationScan(s.lyrics);
              editMode.value = false;
              selectedHistoryId.value = s.id;
              const gens = s.audio;
              if (gens && Array.isArray(gens) && gens.length) {
                const last = gens.length - 1;
                audioGen.value = { status: 'done', taskId: gens[last].taskId || null, tracks: gens[last].tracks, error: null, generations: gens, activeGen: last };
              } else if (gens && gens.tracks && gens.tracks.length) {
                const legacy = [gens];
                audioGen.value = { status: 'done', taskId: gens.taskId || null, tracks: gens.tracks, error: null, generations: legacy, activeGen: 0 };
              } else {
                audioGen.value = { status: 'idle', taskId: null, tracks: [], error: null, generations: [], activeGen: -1 };
              }
            }}>
              <div style="display:flex;align-items:center;gap:10px;min-width:0">
                <span style="flex-shrink:0;width:8px;height:8px;border-radius:50%;background:${authentic ? 'var(--success)' : 'var(--accent)'}" title="${authentic ? 'passed dialect checks' : 'had high-severity hits'}"></span>
                  <div style="min-width:0;flex:1;display:flex;align-items:center;gap:6px">
                  <div style="font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</div>
                  ${(Array.isArray(s.audio) ? s.audio.length : s.audio?.tracks?.length) ? html`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>` : ''}
                  ${s.wasRepaired ? html`<span style="flex-shrink:0;font-size:9px;color:#c7bca6;background:#f5f0e6;padding:0 5px;border-radius:3px;line-height:16px" title="Revised after critic feedback">R</span>` : ''}
                  <div style="font-family:var(--mono);font-size:10px;color:#b0a48f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.topic || '').slice(0, 28)} · ${dateStr}</div>
                </div>
                <button onClick=${e => { e.stopPropagation(); history.value = history.value.filter(h => h.id !== s.id); }} style="flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:#c7bca6;cursor:pointer;border-radius:5px;font-size:14px">✕</button>
              </div>
            </div>
          `;
        })}
      </div>
    </section>
  `;
}

const STRUCTURAL = /^\[\s*(intro|verse|chorus|pre[-\s]?chorus|bridge|outro|hook|refrain|interlude|coda|ending|end)\b/i;
function isChorus(text) { return /^\[\s*chorus/i.test(text || ''); }

function LyricsReadMode() {
  if (!songLyrics.value) return null;
  const segs = segmentLyrics(songLyrics.value, scanHits.value);
  const hovered = hoveredHit.value;
  let section = '';
  let firstContent = true;

  return html`
    <div class="lyrics-sheet">
      ${segs.map(ln => {
        if (ln.type === 'tag') {
          if (STRUCTURAL.test(ln.text)) {
            section = isChorus(ln.text) ? 'chorus' : 'other';
            const label = ln.text.replace(/^\[|\]$/g, '');
            return html`<div class="ly-section"><span class="ly-sec-label">${label}</span><span class="ly-sec-rule"></span></div>`;
          }
          // performance / vocal direction tag
          return html`<div class="ly-line"><span class="ly-perf">${ln.text}</span></div>`;
        }
        if (ln.type === 'blank') return html`<div class="ly-blank"></div>`;
        const cls = 'ly-line' + (section === 'chorus' ? ' ly-chorus-line' : '') + (firstContent ? ' first' : '');
        firstContent = false;
        return html`<div class="${cls}">${ln.segments.map(sg => {
          if (!sg.hit) return html`<span>${sg.text}</span>`;
          const hi = sg.severity === 'high';
          const on = sg.idx === hovered;
          const uc = hi ? '#c0472a' : '#a9791a';
          const bg = on ? (hi ? '#f0c6b7' : '#ecd6a4') : (hi ? '#f7ddd3' : '#f4e8cc');
          return html`<mark class="ly-hit" onMouseEnter=${() => hoveredHit.value = sg.idx} onMouseLeave=${() => hoveredHit.value = null} style="background:${bg};border-bottom:2px solid ${uc};box-shadow:${on ? '0 0 0 2px ' + uc : 'none'}">${sg.text}</mark>`;
        })}</div>`;
      })}
    </div>
  `;
}

function PipelineCard() {
  const sts = pipelineSteps.value;
  const anyDone = sts.some(s => s.status !== 'idle');
  const anyActive = sts.some(s => s.status === 'active');
  let label = 'Idle', bg = '#ece5d6', fg = '#a89a84';
  if (pipelineError.value) { label = 'Failed'; bg = 'var(--accent-soft)'; fg = 'var(--accent)'; }
  else if (anyActive) { label = 'Running'; bg = 'var(--accent-soft)'; fg = 'var(--accent)'; }
  else if (anyDone) { label = 'Complete'; bg = 'var(--success-soft)'; fg = 'var(--success)'; }
  return html`
    <section class="card">
      <div class="card-header" style="margin-bottom:4px">
        <h2 class="panel-title">Pipeline</h2>
        <span class="badge" style="background:${bg};color:${fg}">${label}</span>
      </div>
      <p style="font-size:11px;color:var(--text-dim);line-height:1.45;margin-bottom:12px">Five stages run in sequence — each reports its own result.</p>
      <${StageList} />
      <${ErrorBanner} />
    </section>
  `;
}

      ${showSunoConfirm.value && pendingSunoArgs.value ? html`
        <div class="modal" onClick=${e => { if (e.target === e.currentTarget) showSunoConfirm.value = false; }}>
          <div class="modal-box" style="max-width:420px">
            <div class="modal-head">
              <h2 style="font-size:15px;font-weight:700;color:var(--ink)">Generate Audio?</h2>
              <button class="icon-btn" style="width:28px;height:28px" onClick=${() => showSunoConfirm.value = false}>✕</button>
            </div>
            <div style="padding:18px 22px">
              <p style="font-size:13px;color:var(--text-dim);line-height:1.55">This uses the Suno API and costs credits. <strong style="color:var(--ink)">2 tracks</strong> will be generated from your lyrics and style prompt.</p>
              <p style="font-size:13px;color:var(--text-dim);margin-top:10px;line-height:1.5">Title: <strong style="color:var(--ink)">${pendingSunoArgs.value.title}</strong><br>Style: <strong style="color:var(--ink)">${pendingSunoArgs.value.style || '(none)'}</strong></p>
              <div style="display:flex;gap:10px;margin-top:18px">
                <button class="btn btn-primary" style="flex:1;padding:11px" onClick=${async () => {
                  const a = pendingSunoArgs.value;
                  showSunoConfirm.value = false;
                  pendingSunoArgs.value = null;
                  await generateAudio(a.title, a.style, a.lyrics, false);
                }}>Generate</button>
                <button class="btn btn-secondary" style="flex:1;padding:11px" onClick=${() => { showSunoConfirm.value = false; pendingSunoArgs.value = null; }}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      ` : null}
    </section>
  `;
}

function StageList() {
  const sts = pipelineSteps.value;
  const pal = (status) => {
    const m = {
      idle:    { dot: '#ece4d3', ring: 'transparent', ic: '#b0a48f', label: '#a89a84', sub: '#c0b39c' },
      active:  { dot: 'var(--accent)', ring: 'var(--accent-soft)', ic: '#fff', label: 'var(--ink)', sub: 'var(--accent)' },
      done:    { dot: 'var(--success)', ring: 'transparent', ic: '#fff', label: 'var(--ink)', sub: '#8a9a78' },
      failed:  { dot: 'var(--accent)', ring: 'transparent', ic: '#fff', label: 'var(--accent)', sub: 'var(--accent)' },
      skipped: { dot: '#e4ddcd', ring: 'transparent', ic: '#b0a48f', label: '#b0a48f', sub: '#c0b39c' },
    };
    return m[status] || m.idle;
  };
  const iconC = (stg, i) => stg.status === 'done' ? '✓' : stg.status === 'failed' ? '!' : stg.status === 'skipped' ? '–' : String(i + 1);
  return html`
    <div style="display:flex;flex-direction:column">
      ${STAGES.map((d, i) => {
        const stg = sts.find(s => s.name === d.key) || { status: 'idle', message: '' };
        const p = pal(stg.status);
        const sub = stg.message || d.blurb;
        const last = i === STAGES.length - 1;
        return html`
          <div style="display:flex;align-items:stretch;gap:12px">
            <div style="display:flex;flex-direction:column;align-items:center">
              <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:${p.dot};box-shadow:0 0 0 4px ${p.ring};display:flex;align-items:center;justify-content:center;transition:background .2s;animation:${stg.status === 'active' ? 'bbpulse 1.3s ease-in-out infinite' : 'none'}">
                ${stg.status === 'active'
                  ? html`<div style="width:11px;height:11px;border:2px solid rgba(255,255,255,0.45);border-top-color:#fff;border-radius:50%;animation:bbspin .7s linear infinite"></div>`
                  : html`<span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${p.ic}">${iconC(stg, i)}</span>`}
              </div>
              ${!last ? html`<div style="width:2px;flex:1;min-height:12px;background:#e5dcca;margin:3px 0"></div>` : ''}
            </div>
            <div style="min-width:0;padding-bottom:${last ? '0' : '11px'};padding-top:2px">
              <div style="font-size:12.5px;font-weight:600;color:${p.label};line-height:1.2">${d.label}</div>
              <div style="font-size:11px;color:${p.sub};line-height:1.4;margin-top:1px">${sub}</div>
            </div>
          </div>
        `;
      })}
    </div>
  `;
}

if (typeof window !== 'undefined') {
  window.__testSetSong = (title, lyrics, style) => {
    songTitle.value = title; songLyrics.value = lyrics; songStyle.value = style;
  };
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
